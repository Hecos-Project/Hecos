logging:
  level: DEBUG
  destination: console
  message_types: both
  web_level: BOTH
  web_max_history: 100
  web_autoscroll: true
  web_split: false
monitor:
  check_interval: 1
  restart_delay: 2
privacy:
  default_mode: normal
  auto_wipe_on_clear: true
  wipe_messages: true
  wipe_profile: false
  wipe_context: false
processor:
  debug_mode: false
  log_level: INFO
routing_engine:
  mode: auto
  legacy_models: ''
system:
  fast_boot: true
  flask_debug: false
  check_local_backend_on_boot: false
