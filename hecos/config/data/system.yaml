ai:
  active_personality: Urania_9800_Woman.yaml
  available_personalities:
    '1': Hecos_System_Soul.yaml
    '2': Atlas_Man.yaml
    '3': Motoko Kusanagi.yaml
    '4': Nova_X-01.yaml
    '5': Sebastian_Pro.yaml
    '6': Urania_9800_Woman.yaml
  save_special_instructions: false
  special_instructions: ''
  enable_safety_instructions: true
  safety_instructions: ''
  avatar_size: medium
backend:
  type: cloud
  cloud:
    model: gemini/gemini-2.5-flash
    temperature: 0.7
  kobold:
    url: http://localhost:5001
    model: ''
    max_length: 512
    temperature: 0.8
    top_p: 0.92
    rep_pen: 1.1
  ollama:
    model: ''
    available_models: {}
    num_ctx: 4096
    num_gpu: 25
    num_predict: 250
    temperature: 0.3
    top_p: 0.9
    repeat_penalty: 1.1
    keep_alive: 120m
bridge:
  use_processor: true
  chunk_delay_ms: 0
  debug_log: true
  remove_think_tags: true
  local_voice_enabled: false
  webui_voice_enabled: true
  webui_voice_stt: true
  enable_tools: true
cognition:
  memory_enabled: true
  episodic_memory: true
  clear_on_restart: false
  include_identity_context: true
  include_self_awareness: true
  max_history_messages: 20
extensions:
  calendar:
    calendar_locale: fr
    calendar_country: IT
    day_colors:
      - rgba(172,47,47,0.35)
      - transparent
      - transparent
      - transparent
      - transparent
      - rgba(33,186,13,0.2)
      - rgba(127,122,122,0.2)
filters:
  remove_asterisks: both
  remove_round_brackets: voice
  remove_square_brackets: none
  custom_filters: []
  custom_replacements: {}
language: en
llm:
  allow_cloud: true
  debug_llm: true
  providers:
    gemini:
      api_key: ''
      models:
        - gemini/gemini-2.0-flash
    openai:
      api_key: ''
      models:
        - openai/gpt-4o
    anthropic:
      api_key: ''
      models:
        - anthropic/claude-3-5-sonnet-20240620
    groq:
      api_key: ''
      models:
        - groq/llama-3.3-70b-versatile
logging:
  level: DEBUG
  destination: console
  message_types: both
  web_level: BOTH
  web_max_history: 100
  web_autoscroll: true
  web_split: false
monitor:
  check_interval: 1
  restart_delay: 2
plugins:
  DASHBOARD:
    enabled: true
    lazy_load: false
    backend_timeout: 0.5
    monitor_interval: 2
    webui_dashboard_enabled: true
    webui_telemetry_enabled: true
    console_dashboard_enabled: true
    console_telemetry_enabled: true
    track_cpu: false
    track_ram: false
    track_vram: false
  FILE_MANAGER:
    enabled: true
    lazy_load: false
    enable_path_mapping: true
    max_list_items: 5
    max_read_lines: 50
  HELP:
    enabled: true
    lazy_load: false
    show_disabled: false
  IMAGE_GEN:
    enabled: true
    lazy_load: false
    width: 1024
    height: 1024
    nologo: false
  MEDIA:
    enabled: true
    lazy_load: false
  SYSTEM:
    enabled: true
    lazy_load: false
    enable_config_set: true
    shell_command_timeout: 15
    shell_command_whitelist: []
    explorer_mappings: {}
    programs: {}
  SYS_NET:
    enabled: true
    lazy_load: false
    proxy_enabled: false
    proxy_url: socks5://localhost:9150
  WEB:
    enabled: true
    lazy_load: false
    llm_model: ''
    search_engine: google
    use_https: true
    open_in_new_tab: false
  WEBCAM:
    enabled: true
    lazy_load: false
    camera_index: 0
    image_format: jpg
    save_directory: snapshots
    stabilization_delay: 0.5
  WEB_UI:
    enabled: true
    lazy_load: false
    port: 7070
    api_port: 5000
    auto_open_browser: false
    https_enabled: true
    force_login: true
    cert_file: certs/cert.pem
    key_file: certs/key.pem
  EXECUTOR:
    enabled: true
    lazy_load: false
    timeout_seconds: 10
    enable_shell_commands: true
    shell_timeout: 15
    max_read_lines: 200
    workspace_dir: workspace/sandbox
  DRIVE:
    enabled: true
    lazy_load: true
    root_dir: ''
    max_upload_mb: 100
    allowed_extensions: ''
    editor:
      enabled: true
      theme: vs-dark
      max_file_size_kb: 1024
      word_wrap: true
      spell_check: false
  REMOTE_TRIGGERS:
    enabled: true
    lazy_load: false
    settings:
      enable_mediasession: true
      enable_volume_keys: true
      enable_volume_loop: false
      feedback_sounds: true
      visual_indicator: true
  REMINDER:
    enabled: true
    lazy_load: false
    reminder_mode: voice
    ringtone_path: Default_System_Alert.mp3
    time_format: 24h
    max_reminders: 50
    snooze_default_minutes: 15
    reminder_snooze_ui: false
  MCP_BRIDGE:
    enabled: false
    lazy_load: false
    servers: {}
  extra_dirs: []
privacy:
  default_mode: normal
  auto_wipe_on_clear: true
  wipe_messages: true
  wipe_profile: false
  wipe_context: false
processor:
  debug_mode: false
  log_level: INFO
routing_engine:
  mode: auto
  legacy_models: ''
system:
  fast_boot: true
  flask_debug: false
agent:
  action_console_enabled: true
  enabled: true
  max_iterations: 12
  verbose_traces: true
