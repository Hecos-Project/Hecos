ai:
  active_personality: Hecos_System_Soul.yaml
  available_personalities:
    '1': Hecos_System_Soul.yaml
    '2': Atlas_Man.yaml
    '3': Motoko Kusanagi.yaml
    '4': Nova_X-01.yaml
    '5': Sebastian_Pro.yaml
    '6': Urania_9800.yaml
  save_special_instructions: false
  special_instructions: ''
  enable_safety_instructions: true
  safety_instructions: ''
  avatar_size: medium
backend:
  type: cloud
  cloud:
    model: gemini/gemini-2.5-flash
    temperature: 0.7
  kobold:
    url: http://localhost:5001
    model: ''
    max_length: 512
    temperature: 0.8
    top_p: 0.92
    rep_pen: 1.1
  ollama:
    model: qwen2.5:1.5b
    available_models: {}
    num_ctx: 4096
    num_gpu: 25
    num_predict: 250
    temperature: 0.3
    top_p: 0.9
    repeat_penalty: 1.1
    keep_alive: 120m
bridge:
  use_processor: true
  chunk_delay_ms: 0
  debug_log: true
  remove_think_tags: true
  local_voice_enabled: false
  webui_voice_enabled: true
  webui_voice_stt: true
  enable_tools: true
cognition:
  memory_enabled: true
  episodic_memory: true
  clear_on_restart: false
  include_identity_context: true
  include_self_awareness: true
  max_history_messages: 20
  rag:
    enabled: false
    embedder: sentence_transformers
    embedder_model: all-MiniLM-L6-v2
    chunk_size: 512
    chunk_overlap: 64
    top_k: 5
    similarity_threshold: 0.3
    auto_ingest_history: false
    persist_path: memory/vector_store
filters:
  remove_asterisks: both
  remove_round_brackets: voice
  remove_square_brackets: none
  custom_filters: []
  custom_replacements: {}
language: en
llm:
  allow_cloud: true
  debug_llm: true
  providers:
    gemini:
      api_key: ''
      models:
        - gemini/gemini-2.0-flash
    openai:
      api_key: ''
      models:
        - openai/gpt-4o
    anthropic:
      api_key: ''
      models:
        - anthropic/claude-3-5-sonnet-20240620
    groq:
      api_key: ''
      models:
        - groq/llama-3.3-70b-versatile
logging:
  level: DEBUG
  destination: console
  message_types: both
  web_level: BOTH
  web_max_history: 100
  web_autoscroll: true
  web_split: false
monitor:
  check_interval: 1
  restart_delay: 2
privacy:
  default_mode: normal
  auto_wipe_on_clear: true
  wipe_messages: true
  wipe_profile: false
  wipe_context: false
processor:
  debug_mode: false
  log_level: INFO
routing_engine:
  mode: auto
  legacy_models: ''
system:
  fast_boot: true
  flask_debug: false


