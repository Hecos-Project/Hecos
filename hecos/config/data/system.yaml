ai:
  active_personality: Urania_9800.yaml
  available_personalities:
    '1': Hecos_System_Soul.yaml
    '2': Atlas_Man.yaml
    '3': Claudia.yaml
    '4': Jun_my_little_princess.yaml
    '5': Motoko Kusanagi.yaml
    '6': Nova_X-01.yaml
    '7': Sebastian_Pro.yaml
    '8': Urania_9800.yaml
  save_special_instructions: false
  special_instructions: ''
  enable_safety_instructions: true
  safety_instructions: ''
  avatar_size: medium
backend:
  type: cloud
  cloud:
    model: gemini/gemini-2.5-flash
    temperature: 0.7
  kobold:
    url: http://localhost:5001
    model: ''
    max_length: 512
    temperature: 0.7
    top_p: 0.95
    rep_pen: 1.1
  ollama:
    url: admin
    model: ''
    available_models: {}
    num_ctx: 4096
    num_gpu: 33
    num_predict: 1024
    temperature: 0.3
    top_p: 0.95
    repeat_penalty: 1.1
    keep_alive: 120m
    probe_timeout_sec: 3
cognition:
  memory_enabled: true
  episodic_memory: true
  clear_on_restart: false
  include_identity_context: true
  include_self_awareness: true
  max_history_messages: 20
  rag:
    enabled: false
    embedder: sentence_transformers
    embedder_model: all-MiniLM-L6-v2
    chunk_size: 512
    chunk_overlap: 64
    top_k: 5
    similarity_threshold: 0.3
    auto_ingest_history: false
    persist_path: memory/vector_store
filters:
  remove_asterisks: both
  remove_round_brackets: voice
  remove_square_brackets: none
  custom_filters: []
  custom_replacements: {}
language: en
llm:
  allow_cloud: true
  debug_llm: false
  providers:
    gemini:
      api_key: ''
      models:
      - gemini-2.5-flash
      - gemini-2.5-pro
      - gemini-2.0-flash
      - gemini-2.0-flash-001
      - gemini-2.0-flash-lite-001
      - gemini-2.0-flash-lite
      - gemini-2.5-flash-preview-tts
      - gemini-2.5-pro-preview-tts
      - gemma-4-26b-a4b-it
      - gemma-4-31b-it
      - gemini-flash-latest
      - gemini-flash-lite-latest
      - gemini-pro-latest
      - gemini-2.5-flash-lite
      - gemini-2.5-flash-image
      - gemini-3-pro-preview
      - gemini-3-flash-preview
      - gemini-3.1-pro-preview
      - gemini-3.1-pro-preview-customtools
      - gemini-3.1-flash-lite-preview
      - gemini-3.1-flash-lite
      - gemini-3-pro-image-preview
      - gemini-3-pro-image
      - nano-banana-pro-preview
      - gemini-3.1-flash-image-preview
      - gemini-3.1-flash-image
      - gemini-3.1-flash-lite-image
      - gemini-3.5-flash
      - gemini-omni-flash-preview
      - lyria-3-clip-preview
      - lyria-3-pro-preview
      - gemini-3.1-flash-tts-preview
      - gemini-robotics-er-1.5-preview
      - gemini-robotics-er-1.6-preview
      - gemini-2.5-computer-use-preview-10-2025
      - antigravity-preview-05-2026
      - deep-research-max-preview-04-2026
      - deep-research-preview-04-2026
      - deep-research-pro-preview-12-2025
      - gemini-embedding-001
      - gemini-embedding-2-preview
      - gemini-embedding-2
      - aqa
      - imagen-4.0-generate-001
      - imagen-4.0-ultra-generate-001
      - imagen-4.0-fast-generate-001
      - veo-3.1-generate-preview
      - veo-3.1-fast-generate-preview
