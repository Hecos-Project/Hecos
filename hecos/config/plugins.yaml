extensions: {}
plugins:
  CONTACTS:
    enabled: true
    lazy_load: true
  DRIVE:
    allowed_extensions: ''
    editor:
      enabled: true
      max_file_size_kb: 1024
      spell_check: false
      theme: vs-dark
      word_wrap: true
    enabled: true
    lazy_load: true
    max_upload_mb: 100
    root_dir: ''
  EXECUTOR:
    enable_shell_commands: true
    enabled: true
    lazy_load: true
    max_read_lines: 200
    shell_timeout: 15
    timeout_seconds: 10
    workspace_dir: workspace/sandbox
  FILE_MANAGER:
    enable_path_mapping: true
    enabled: true
    lazy_load: true
    max_list_items: 5
    max_read_lines: 50
  FLOWS:
    auto_save_compiled: false
    autosave_enabled: true
    autosave_interval_minutes: 1
    compiler_max_tokens: 2048
    compiler_temperature: 0.1
    enabled: true
    flows_dir: workspace/flows
    jinja2_rendering: true
    lazy_load: true
    max_concurrent_runs: 5
    max_log_entries: 500
    scheduler_enabled: true
    scheduler_timezone: local
  HELP:
    enabled: true
    lazy_load: true
    show_disabled: false
  MCP_BRIDGE:
    enabled: false
    lazy_load: false
    servers: {}
  SYSTEM:
    enable_config_set: true
    enabled: true
    explorer_mappings: {}
    lazy_load: false
    programs: {}
    shell_command_timeout: 15
    shell_command_whitelist: []
  SYS_NET:
    enabled: true
    lazy_load: true
    proxy_enabled: false
    proxy_url: socks5://localhost:9150
  USERS:
    enabled: true
    lazy_load: true
  WEB_UI:
    api_port: 5000
    auto_open_browser: false
    cert_file: certs/cert.pem
    enabled: true
    force_login: true
    https_enabled: false
    key_file: certs/key.pem
    lazy_load: false
    port: 7070
  extra_dirs: []
