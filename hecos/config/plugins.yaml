plugins:
  FILE_MANAGER:
    enabled: true
    lazy_load: true
    enable_path_mapping: true
    max_list_items: 5
    max_read_lines: 50
  HELP:
    enabled: true
    lazy_load: true
    show_disabled: false
  IMAGE_GEN:
    enabled: true
    lazy_load: true
    width: 1024
    height: 1024
    nologo: false
  MEDIA_PLAYER:
    enabled: true
    lazy_load: true
  SYSTEM:
    enabled: true
    lazy_load: false
    enable_config_set: true
    shell_command_timeout: 15
    shell_command_whitelist: []
    explorer_mappings: {}
    programs: {}
  SYS_NET:
    enabled: true
    lazy_load: true
    proxy_enabled: false
    proxy_url: socks5://localhost:9150
  WEB:
    enabled: true
    lazy_load: true
    llm_model: ''
    search_engine: google
    use_https: true
    open_in_new_tab: false
  WEBCAM:
    enabled: true
    lazy_load: true
    camera_index: 0
    image_format: jpg
    save_directory: snapshots
    stabilization_delay: 0.5
  WEB_UI:
    enabled: true
    lazy_load: false
    port: 7070
    api_port: 5000
    auto_open_browser: false
    https_enabled: false
    force_login: true
    cert_file: certs/cert.pem
    key_file: certs/key.pem
  EXECUTOR:
    enabled: true
    lazy_load: true
    timeout_seconds: 10
    enable_shell_commands: true
    shell_timeout: 15
    max_read_lines: 200
    workspace_dir: workspace/sandbox
  DRIVE:
    enabled: true
    lazy_load: true
    root_dir: ''
    max_upload_mb: 100
    allowed_extensions: ''
    editor:
      enabled: true
      theme: vs-dark
      max_file_size_kb: 1024
      word_wrap: true
      spell_check: false
  REMOTE_TRIGGERS:
    enabled: true
    lazy_load: true
    settings:
      enable_mediasession: true
      enable_volume_keys: true
      enable_volume_loop: false
      feedback_sounds: true
      visual_indicator: true
  REMINDER:
    enabled: true
    lazy_load: false
    reminder_mode: voice
    ringtone_path: Default_System_Alert.mp3
    time_format: 24h
    max_reminders: 50
    snooze_default_minutes: 15
    reminder_snooze_ui: false
  MCP_BRIDGE:
    enabled: false
    lazy_load: false
    servers: {}
  AUTOMATION:
    enabled: true
    lazy_load: true
    move_duration: 0.15
    type_interval: 0.02
    allow_window_control: true
  BROWSER:
    enabled: true
    lazy_load: true
    headless: false
    block_ads: true
    startup_url: http://localhost:7070
    default_timeout: 10000
    browser_type: chromium
    browser_engine_mode: app_mode
    cdp_port: 9222
  CALENDAR:
    enabled: true
    lazy_load: false
  USERS:
    enabled: true
    lazy_load: true
  CONTACTS:
    enabled: true
    lazy_load: true
  MAIL:
    enabled: true
    lazy_load: true
    mail_address: ''
    mail_app_password: ''
    smtp_host: ''
    smtp_port: 587
    smtp_security: STARTTLS
    imap_host: ''
    imap_port: 993
    imap_security: SSL
    max_messages: 100
    sync_on_open: true
    auto_detect_provider: true
  FLOWS:
    enabled: true
    lazy_load: true
    flows_dir: workspace/flows
    scheduler_enabled: true
    scheduler_timezone: local
    max_log_entries: 500
    compiler_temperature: 0.1
    compiler_max_tokens: 2048
    auto_save_compiled: false
    jinja2_rendering: true
    max_concurrent_runs: 5
    autosave_enabled: true
    autosave_interval_minutes: 1
  LISTS:
    enabled: true
    lazy_load: true
    default_icon: 📋
    max_items_per_list: 500
    max_lists: 50
    show_completed: true
  extra_dirs: []
extensions:
  calendar:
    calendar_locale: en-US
    calendar_country: US
    day_colors:
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
    calendar_sync_urls: []
    bg_color: ''
    bg_image: ''
