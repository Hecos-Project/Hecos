extensions:
  calendar:
    bg_color: ''
    bg_image: ''
    calendar_country: US
    calendar_locale: en-US
    calendar_sync_urls: []
    day_colors:
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
plugins:
  AUTOMATION:
    allow_window_control: true
    enabled: true
    lazy_load: true
    move_duration: 0.15
    type_interval: 0.02
  BROWSER:
    block_ads: true
    browser_engine_mode: app_mode
    browser_type: chromium
    cdp_port: 9222
    default_timeout: 10000
    enabled: true
    headless: false
    lazy_load: true
    startup_url: http://localhost:7070
  CALENDAR:
    enabled: true
    lazy_load: false
  CONTACTS:
    enabled: true
    lazy_load: true
  DRIVE:
    allowed_extensions: ''
    editor:
      enabled: true
      max_file_size_kb: 1024
      spell_check: false
      theme: vs-dark
      word_wrap: true
    enabled: true
    lazy_load: true
    max_upload_mb: 100
    root_dir: ''
  EXECUTOR:
    enable_shell_commands: true
    enabled: true
    lazy_load: true
    max_read_lines: 200
    shell_timeout: 15
    timeout_seconds: 10
    workspace_dir: workspace/sandbox
  FILE_MANAGER:
    enable_path_mapping: true
    enabled: true
    lazy_load: true
    max_list_items: 5
    max_read_lines: 50
  FLOWS:
    auto_save_compiled: false
    autosave_enabled: true
    autosave_interval_minutes: 1
    compiler_max_tokens: 2048
    compiler_temperature: 0.1
    enabled: true
    flows_dir: workspace/flows
    jinja2_rendering: true
    lazy_load: true
    max_concurrent_runs: 5
    max_log_entries: 500
    scheduler_enabled: true
    scheduler_timezone: local
  HELP:
    enabled: true
    lazy_load: true
    show_disabled: false
  LISTS:
    default_icon: "\xF0\u0178\u201C\u2039"
    enabled: true
    lazy_load: true
    max_items_per_list: 500
    max_lists: 50
    show_completed: true
  MAIL:
    auto_detect_provider: true
    enabled: true
    imap_host: ''
    imap_port: 993
    imap_security: SSL
    lazy_load: true
    mail_address: ''
    mail_app_password: ''
    max_messages: 100
    smtp_host: ''
    smtp_port: 587
    smtp_security: STARTTLS
    sync_on_open: true
  MCP_BRIDGE:
    enabled: false
    lazy_load: false
    servers: {}
  MEDIA_PLAYER:
    enabled: true
    lazy_load: true
  REMINDER:
    enabled: true
    lazy_load: false
    max_reminders: 50
    reminder_mode: voice
    reminder_snooze_ui: false
    ringtone_path: Default_System_Alert.mp3
    snooze_default_minutes: 15
    time_format: 24h
  
  SYSTEM:
    enable_config_set: true
    enabled: true
    explorer_mappings: {}
    lazy_load: false
    programs: {}
    shell_command_timeout: 15
    shell_command_whitelist: []
  SYS_NET:
    enabled: true
    lazy_load: true
    proxy_enabled: false
    proxy_url: socks5://localhost:9150
  USERS:
    enabled: true
    lazy_load: true
  WEB:
    enabled: true
    lazy_load: true
    llm_model: ''
    open_in_new_tab: false
    search_engine: google
    use_https: true
  
  WEB_UI:
    api_port: 5000
    auto_open_browser: false
    cert_file: certs/cert.pem
    enabled: true
    force_login: true
    https_enabled: false
    key_file: certs/key.pem
    lazy_load: false
    port: 7070
  extra_dirs: []
