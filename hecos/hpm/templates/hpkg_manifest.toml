id = "templates"
manifest_version = "1"
name = "Templates"
readme = "README.md"
tag = "TEMPLATES"
type = "plugin"
description = "Centralized template manager for communications (Mail, WhatsApp, Telegram)."
version = "1.0.2"
author = "Hecos"
pip_isolation = "shared"
target_dir = "hpm"
plugin_dir = "."
lazy_load = true
is_class_based = true
api_routes_file = "web/routes.py"
signature = "YG3C6qqORa4xkSQKlaLYhlmR/x0GkOtGciaZI3TvAFaBs9yEgQLDCbheM47r5W6F/Ei7/AT4ndsXQNQeH2StDQ=="

[config_panel]
tab_id = "templates"
tab_label = "Templates"
tab_icon = "fa-file-alt"
category = "CONNETTIVITÀ"
template_file = "web/templates/config_templates.html"
api_routes_file = "web/routes.py"
config_api_get = "/hecos/api/plugins/templates/config"
config_api_post = "/hecos/api/plugins/templates/config"

[capabilities]
llm_tools = [
    "list_templates",
    "render_template",
]
slash_commands = []
has_widget = false
has_config_panel = true
has_api_routes = true
has_system_calls = false
syscall_notes = ""
notes = ""

[[tool_schema]]
type = "function"

[tool_schema.function]
name = "TEMPLATES__list_templates"
description = "List all available templates. Channel is optional (e.g. 'whatsapp', 'email', 'telegram', 'discord')."

[tool_schema.function.parameters]
type = "object"

[tool_schema.function.parameters.properties.channel]
type = "string"
description = "Optional channel filter."

[[tool_schema]]
type = "function"

[tool_schema.function]
name = "TEMPLATES__render_template"
description = "Render a template by replacing its variables and combining header/body/footer. Use this before sending a message if you want to use a specific template."

[tool_schema.function.parameters]
type = "object"
required = [
    "template_id_or_name",
    "variables",
]

[tool_schema.function.parameters.properties.template_id_or_name]
type = "string"
description = "The ID or the exact Name of the template."

[tool_schema.function.parameters.properties.variables]
type = "string"
description = "A JSON string containing the variables to inject (e.g. '{\"nome\": \"Mario\"}')."

