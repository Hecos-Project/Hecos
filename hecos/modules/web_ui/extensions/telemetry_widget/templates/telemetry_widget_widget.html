<div class="sidebar-card" id="telemetry-widget" style="padding:10px 12px;">
    <div class="sidebar-card-title" style="cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:0; padding:0;" onclick="const b = document.getElementById('live-status-body'); b.style.display = b.style.display === 'none' ? 'block' : 'none';">
        <span class="ql-icon"><i class="fas fa-tachometer-alt"></i></span>
        <span class="ql-title">System Telemetry</span>
        <span onclick="event.stopPropagation(); window.hecosOpenConfig('#widgets')" 
              style="margin-left:auto; cursor:pointer; font-size:12px; opacity:0.6; padding-right:4px;" 
              title="Configure Telemetry"><i class="fas fa-cog"></i></span>
        <span class="ql-chevron"><i class="fas fa-chevron-down"></i></span>
    </div>
    
    <div id="live-status-body" class="ql-body" style="margin-top:12px;">
        <div id="live-status" style="display:flex; flex-direction:column; gap:6px; font-size:12px;">
            <div class="stat"><div class="stat-prefix"><i class="fas fa-server"></i> <span class="stat-label">System:</span></div> <span id="tel-backend" class="stat-val">—</span></div>
            
            <div class="stat" id="row-tel-cpu" style="display:none;"><div class="stat-prefix"><i class="fas fa-microchip"></i> <span class="stat-label">CPU:</span></div> <span id="tel-cpu" class="stat-val">—</span></div>
            <div class="stat" id="row-tel-ram" style="display:none;"><div class="stat-prefix"><i class="fas fa-memory"></i> <span class="stat-label">RAM:</span></div> <span id="tel-ram" class="stat-val">—</span></div>
            <div class="stat" id="row-tel-vram" style="display:none;"><div class="stat-prefix"><i class="fas fa-video"></i> <span class="stat-label">VRAM:</span></div> <span id="tel-vram" class="stat-val">—</span></div>
            
            <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:4px 0;">
            
            <div class="stat"><div class="stat-prefix"><i class="fas fa-microphone"></i> <span class="stat-label">Mic:</span></div> <span id="tel-mic" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-volume-up"></i> <span class="stat-label">TTS:</span></div> <span id="tel-tts" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-hand-pointer"></i> <span class="stat-label">PTT:</span></div> <span id="tel-ptt" class="stat-val">—</span></div>
            
            <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:4px 0;">

            <div class="stat"><div class="stat-prefix"><i class="fas fa-cog"></i> <span class="stat-label">Config:</span></div> <span id="tel-config" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-brain"></i> <span class="stat-label">Model:</span></div> <span id="tel-model" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-wrench"></i> <span class="stat-label">Tool:</span></div> <span id="tel-tool" class="stat-val">—</span></div>
        </div>

        <style>
            #live-status .stat { display:flex; justify-content:space-between; align-items:center; padding:2px 4px; border-radius:4px; }
            #live-status .stat:hover { background:rgba(255,255,255,0.02); }
            #live-status .stat-prefix { display:flex; align-items:center; gap:6px; color:var(--muted); }
            #live-status .stat-label { margin-left:2px; }
            #live-status .stat-val { font-weight:600; font-family:'JetBrains Mono', monospace; font-size:11px; }
            #live-status .val-ok { color: var(--green, #2ecc71); }
            #live-status .val-err { color: var(--red, #e74c3c); }
        </style>

        <script>
        (function() {
            function updateMetric(id, val, rowId) {
                const el = document.getElementById(id);
                const row = rowId ? document.getElementById(rowId) : null;
                if (!el) return;
                if (val !== undefined && val !== null) {
                    el.textContent = val + '%';
                    el.className = 'stat-val ' + (val >= 90 ? 'val-err' : '');
                    if (row) row.style.display = 'flex';
                } else {
                    el.textContent = '—';
                    if (row) row.style.display = 'none';
                }
            }

            function updateStatus(id, val) {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = val || '—';
                el.className = 'stat-val ' + (val === 'ON' ? 'val-ok' : 'val-err');
            }

            function setSpan(id, val) {
                const el = document.getElementById(id);
                if (el) el.textContent = val;
            }

            async function pollTelemetryStatus() {
                try {
                    const r = await fetch('/hecos/status');
                    if (!r.ok) return;
                    const d = await r.json();
                    
                    setSpan('tel-backend', d.backend || '—');
                    updateMetric('tel-cpu', d.cpu, 'row-tel-cpu');
                    updateMetric('tel-ram', d.ram, 'row-tel-ram');
                    updateMetric('tel-vram', d.vram, 'row-tel-vram');
                    
                    updateStatus('tel-mic', d.mic);
                    updateStatus('tel-tts', d.tts);
                    updateStatus('tel-ptt', d.ptt);
                    
                    setSpan('tel-config', d.config || '—');
                    setSpan('tel-model', d.model || '—');
                    setSpan('tel-tool', d.last_tool || '—');
                } catch(e) {
                    // Fail silently for background polls
                }
            }

            // Fallback for openConfig if clicked inside iframe
            if (!window.hecosOpenConfig) {
                window.hecosOpenConfig = function(hash) {
                    if (window.parent && window.parent.hecosOpenConfig) {
                        window.parent.hecosOpenConfig(hash);
                    } else {
                        window.open('/hecos/config/ui' + (hash || ''), '_blank', 'noopener');
                    }
                };
            }

            // Start polling
            pollTelemetryStatus();
            setInterval(pollTelemetryStatus, 3000);
        })();
        </script>
    </div>
</div>
