<div class="sidebar-card" id="telemetry-widget" style="padding:10px 12px;">
    <div class="sidebar-card-title" style="cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:0; padding:0;" onclick="const b = document.getElementById('live-status-body'); b.style.display = b.style.display === 'none' ? 'block' : 'none';">
        <span class="ql-icon"><i class="fas fa-server"></i></span>
        <span class="ql-title">System Telemetry</span>
        <span onclick="event.stopPropagation(); window.hecosOpenConfig('#widgets')" 
              style="margin-left:auto; cursor:pointer; font-size:12px; opacity:0.6; padding-right:4px;" 
              title="Configure Telemetry"><i class="fas fa-cog"></i></span>
        <span class="ql-chevron"><i class="fas fa-chevron-down"></i></span>
    </div>
    
    <div id="live-status-body" class="ql-body" style="margin-top:12px;">
        <div id="live-status" style="display:flex; flex-direction:column; gap:6px; font-size:12px;">
            <div class="stat"><div class="stat-prefix"><i class="fas fa-server"></i> <span class="stat-label">System:</span></div> <span id="s-backend" class="stat-val">—</span></div>
            <div class="stat dashboard-only" style="display:none;"><div class="stat-prefix"><i class="fas fa-microchip"></i> <span class="stat-label">CPU:</span></div> <span id="s-cpu" class="stat-val">—</span></div>
            <div class="stat dashboard-only" style="display:none;"><div class="stat-prefix"><i class="fas fa-memory"></i> <span class="stat-label">RAM:</span></div> <span id="s-ram" class="stat-val">—</span></div>
            <div class="stat dashboard-only" style="display:none;"><div class="stat-prefix"><i class="fas fa-video"></i> <span class="stat-label">VRAM:</span></div> <span id="s-vram" class="stat-val">—</span></div>
            
            <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:4px 0;">
            
            <div class="stat"><div class="stat-prefix"><i class="fas fa-microphone"></i> <span class="stat-label">Mic:</span></div> <span id="s-mic" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-volume-up"></i> <span class="stat-label">TTS:</span></div> <span id="s-tts" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-hand-pointer"></i> <span class="stat-label">PTT:</span></div> <span id="s-ptt" class="stat-val">—</span></div>
            
            <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:4px 0;">

            <div class="stat"><div class="stat-prefix"><i class="fas fa-cog"></i> <span class="stat-label">Config:</span></div> <span id="s-config" class="stat-val">—</span></div>
            <div class="stat"><div class="stat-prefix"><i class="fas fa-brain"></i> <span class="stat-label">Model:</span></div> <span id="s-model" class="stat-val">—</span></div>
            <div class="stat dashboard-only" title="Last executed tool" style="display:none;"><div class="stat-prefix"><i class="fas fa-tools"></i> <span class="stat-label">Tool:</span></div> <span id="s-tool" class="stat-val val-ok">—</span></div>
            <div class="stat dashboard-only" title="Token Context Usage" style="display:none;"><div class="stat-prefix"><i class="fas fa-layer-group"></i> <span class="stat-label">Tokens:</span></div> <span id="s-tokens" class="stat-val">—</span></div>
        </div>

        <style>
            #live-status .stat { display:flex; justify-content:space-between; align-items:center; padding:2px 4px; border-radius:4px; }
            #live-status .stat:hover { background:rgba(255,255,255,0.02); }
            #live-status .stat-prefix { display:flex; align-items:center; gap:6px; color:var(--muted); }
            #live-status .stat-label { margin-left:2px; }
            #live-status .stat-val { font-weight:600; font-family:'JetBrains Mono', monospace; font-size:11px; }
            #live-status .val-ok { color: var(--green, #2ecc71); }
            #live-status .val-err { color: var(--red, #e74c3c); }
        </style>
    </div>
</div>
