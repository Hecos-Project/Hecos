<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/ext/map_widget/static/css/map_widget.css?v={{ version }}">

<div class="sidebar-card map-widget-card" id="map-widget" style="padding:10px 12px; position:relative; overflow:hidden;">

    <!-- Header / Title Row -->
    <div class="sidebar-card-title m-0 p-0"
         style="cursor:pointer; display:flex; align-items:center; gap:6px; z-index:2; position:relative;"
         onclick="mapWidget.toggleBody()"
         title="Clicca per espandere/comprimere">
        <i class="fas fa-map-marked-alt"></i> GPS MAP
        <span id="mw-location"
              style="font-size:10px; color:var(--muted); text-transform:none; margin-left:auto;
                     white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px;"
              title="Posizione home">Caricamento...</span>
    </div>

    <!-- Body -->
    <div class="mw-body" id="mw-body" style="z-index:2; position:relative; margin-top:10px;">

        <!-- GPS Badge Row -->
        <div class="mw-status-row" id="mw-status-row">
            <div class="mw-badge mw-badge-home" id="mw-badge-home" title="Posizione home dal profilo">
                <i class="fas fa-home"></i> <span id="mw-home-label">Home</span>
            </div>
            <div class="mw-badge mw-badge-live" id="mw-badge-live" title="GPS live (dispositivo)" style="display:none;">
                <i class="fas fa-satellite-dish fa-pulse"></i> Live
            </div>
            <div class="mw-badge mw-badge-error" id="mw-badge-error" title="Errore" style="display:none;">
                <i class="fas fa-exclamation-triangle"></i> <span id="mw-error-text">Errore</span>
            </div>
        </div>

        <!-- Leaflet Map Container -->
        <div id="mw-map-container" class="mw-map-container">
            <div id="mw-map"></div>
            <div id="mw-map-placeholder" class="mw-placeholder">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Caricamento mappa...</span>
            </div>
        </div>

        <!-- Coordinates Info -->
        <div class="mw-coords-row" id="mw-coords-row" style="display:none;">
            <div class="mw-coord-item" title="Latitudine home">
                <i class="fas fa-arrows-alt-v"></i>
                <span id="mw-lat">--</span>
            </div>
            <div class="mw-coord-item" title="Longitudine home">
                <i class="fas fa-arrows-alt-h"></i>
                <span id="mw-lon">--</span>
            </div>
        </div>

        <!-- Live GPS Note -->
        <div class="mw-gps-note" id="mw-gps-note" style="display:none;">
            <i class="fas fa-info-circle"></i>
            <span id="mw-gps-note-text">GPS live attivo</span>
        </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/ext/map_widget/static/js/map_widget.js?v={{ version }}&bust={{ range(1, 1000000) | random }}"></script>
