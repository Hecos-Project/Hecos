<!-- LISTS WIDGET -->
<div class="sidebar-card" id="lists-widget" style="padding:10px 12px;">
    <div class="sidebar-card-title" style="cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:0; padding:0;" onclick="_listsWidgetToggle()">
        <span class="ql-icon"><i class="fas fa-list-check"></i></span>
        <span class="ql-title" data-i18n="hub_mod_lists">{{ t('hub_mod_lists') or 'Gestore Liste' }}</span>
        <span onclick="event.stopPropagation(); _listsWidgetNav()" 
              style="margin-left:auto; cursor:pointer; font-size:12px; opacity:0.6; padding-right:4px;" 
              title="Apri Gestore Liste"><i class="fas fa-cog"></i></span>
        <span class="ql-chevron" id="lists-widget-toggle"><i class="fas fa-chevron-down"></i></span>
    </div>
    
    <div id="lists-widget-body" class="ql-body" style="margin-top:10px;">
        <div class="lists-widget-items" id="lists-widget-items-container">
            <div class="lw-empty">Caricamento liste...</div>
        </div>
    </div>
</div>

<style>
.widget-lists {
    display: flex;
    flex-direction: column;
}
.lists-widget-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.lw-item {
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.2);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
}
.lw-item:hover {
    background: rgba(var(--primary-color-rgb), 0.3);
}
.lw-icon {
    font-size: 1.2rem;
    margin-right: 10px;
}
.lw-name {
    flex: 1;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.lw-count {
    background: var(--primary-color);
    color: white;
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: bold;
}
.lw-empty, .lw-more {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-style: italic;
    padding: 10px 0;
}
</style>

<script>
let _listsWidgetCollapsed = localStorage.getItem('hecos-lists-collapsed') === '1';

function _listsWidgetApplyCollapsed(yes) {
    const body = document.getElementById('lists-widget-body');
    const tog  = document.getElementById('lists-widget-toggle');
    if (body) body.style.display = yes ? 'none' : '';
    if (tog)  tog.classList.toggle('collapsed', yes);
}

function _listsWidgetToggle() {
    _listsWidgetCollapsed = !_listsWidgetCollapsed;
    localStorage.setItem('hecos-lists-collapsed', _listsWidgetCollapsed ? '1' : '0');
    _listsWidgetApplyCollapsed(_listsWidgetCollapsed);
}

function _listsWidgetNav() {
    // If we are inside the Central Hub, just call showTab
    if (typeof showTab === 'function') {
        showTab('lists');
    } else {
        // From the Control Room or sidebar: open Central Hub then navigate
        window.open('/hecos/config/ui#lists', '_blank');
    }
}

async function _listsWidgetFetch() {
    try {
        const res = await fetch('/api/lists');
        const data = await res.json();
        const container = document.getElementById('lists-widget-items-container');
        if (!container) return;
        
        if (data.ok && data.lists && data.lists.length > 0) {
            let html = '';
            const lists = data.lists;
            for (let i = 0; i < Math.min(lists.length, 5); i++) {
                const lst = lists[i];
                html += `
                <div class="lw-item" onclick="_listsWidgetNav()">
                    <div class="lw-icon">${lst.icon || '📋'}</div>
                    <div class="lw-name">${lst.name}</div>
                    <div class="lw-count">${lst.pending_count || 0}</div>
                </div>
                `;
            }
            if (lists.length > 5) {
                html += `<div class="lw-more">...e altre ${lists.length - 5} liste</div>`;
            }
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="lw-empty">${window.t ? window.t('lists_empty_sidebar') : 'Nessuna lista attiva.'}</div>`;
        }
    } catch(e) {
        console.error("Lists Widget Error:", e);
        const container = document.getElementById('lists-widget-items-container');
        if (container) container.innerHTML = '<div class="lw-empty" style="color:var(--text-danger)">Errore di caricamento</div>';
    }
}

function _listsWidgetInit() {
    _listsWidgetApplyCollapsed(_listsWidgetCollapsed);
    _listsWidgetFetch();
    // Auto-refresh every 60 seconds
    setInterval(_listsWidgetFetch, 60000);
}

// Initial state
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _listsWidgetInit);
} else {
    _listsWidgetInit();
}
</script>
