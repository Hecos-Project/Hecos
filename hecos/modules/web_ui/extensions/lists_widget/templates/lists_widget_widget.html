<!-- LISTS WIDGET — Mini-App Operativa -->
<div class="sidebar-card" id="lists-widget" style="padding:10px 12px;">
    <!-- Header -->
    <div class="sidebar-card-title" style="cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:0; padding:0;" onclick="_lwToggle()">
        <span class="ql-icon"><i class="fas fa-list-check"></i></span>
        <span class="ql-title" data-i18n="hub_mod_lists">{{ t('hub_mod_lists') or 'Gestore Liste' }}</span>
        <span onclick="event.stopPropagation(); _lwOpenFull()"
              style="margin-left:auto; cursor:pointer; font-size:12px; opacity:0.6; padding-right:8px;"
              title="Apri vista completa"><i class="fas fa-expand-alt"></i></span>
        <span class="ql-chevron" id="lw-toggle-icon"><i class="fas fa-chevron-down"></i></span>
    </div>

    <!-- Body -->
    <div id="lw-body" class="ql-body" style="margin-top:10px;">

        <!-- Two-column layout: list nav + content -->
        <div class="lw-app" id="lw-app">

            <!-- Left: list nav -->
            <div class="lw-nav" id="lw-nav">
                <!-- Populated by JS -->
            </div>

            <!-- Right: items of selected list -->
            <div class="lw-content" id="lw-content">
                <div class="lw-placeholder" id="lw-placeholder">
                    <i class="fas fa-hand-pointer"></i>
                    <span>{{ t('lists_select_title') or 'Seleziona una lista' }}</span>
                </div>
                <div id="lw-items-wrap" style="display:none; flex-direction:column; height:100%;">
                    <div class="lw-items-scroll" id="lw-items">
                        <!-- Items populated by JS -->
                    </div>
                    <!-- Quick add -->
                    <div class="lw-quick-add">
                        <input type="text" id="lw-add-input" placeholder="{{ t('lists_add_ph') or 'Aggiungi elemento...' }}"
                               onkeydown="if(event.key==='Enter') _lwAddItem()">
                        <button type="button" onclick="_lwAddItem()" title="Aggiungi"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer actions -->
        <div class="lw-footer">
            <button type="button" class="lw-footer-btn" onclick="_lwNewList()">
                <i class="fas fa-plus"></i> {{ t('lists_new_list') or 'Nuova Lista' }}
            </button>
            <button type="button" class="lw-footer-btn lw-footer-btn-ghost" onclick="_lwOpenFull()">
                <i class="fas fa-expand-alt"></i> {{ t('lists_fullscreen') or 'Vista completa' }}
            </button>
        </div>

    </div>
</div>

<style>
/* ── Lists Widget Layout ── */
.lw-app {
    display: flex;
    gap: 0;
    height: 260px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0,0,0,0.15);
}

/* Nav column */
.lw-nav {
    width: 38%;
    min-width: 90px;
    max-width: 120px;
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 4px;
    scrollbar-width: thin;
}
.lw-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
}
.lw-nav-item:hover { background: rgba(255,255,255,0.06); }
.lw-nav-item.active { background: rgba(var(--accent-rgb), 0.18); }
.lw-nav-icon {
    font-size: 1.1rem;
    line-height: 1;
}
.lw-nav-icon i { font-size: 0.95rem; color: var(--accent); }
.lw-nav-name {
    font-size: 0.68rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
    line-height: 1.2;
}
.lw-nav-item.active .lw-nav-name { color: var(--text); }
.lw-nav-count {
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
    min-width: 16px;
}
.lw-nav-empty {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    padding: 12px 4px;
    font-style: italic;
}

/* Content column */
.lw-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.lw-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--muted);
    font-size: 0.75rem;
    opacity: 0.6;
}
.lw-placeholder i { font-size: 1.4rem; }

/* Items scroll area */
.lw-items-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scrollbar-width: thin;
}
.lw-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 6px;
    border-radius: 5px;
    transition: background 0.15s;
    cursor: default;
}
.lw-row:hover { background: rgba(255,255,255,0.04); }
.lw-row input[type="checkbox"] {
    width: 14px; height: 14px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
}
.lw-row-text {
    flex: 1;
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.3;
    word-break: break-word;
}
.lw-row.done .lw-row-text {
    text-decoration: line-through;
    color: var(--muted);
}
.lw-row-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.65rem;
    opacity: 0;
    padding: 2px 4px;
    border-radius: 3px;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
}
.lw-row:hover .lw-row-del { opacity: 1; }
.lw-row-del:hover { color: var(--red, #f44); }
.lw-items-empty {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 20px 8px;
    font-style: italic;
}

/* Quick add bar */
.lw-quick-add {
    display: flex;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 5px 6px;
    gap: 5px;
    flex-shrink: 0;
}
.lw-quick-add input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 0.78rem;
    font-family: inherit;
    padding: 3px 0;
}
.lw-quick-add input::placeholder { color: var(--muted); opacity: 0.7; }
.lw-quick-add button {
    background: rgba(var(--accent-rgb), 0.2);
    border: none;
    border-radius: 4px;
    color: var(--accent);
    cursor: pointer;
    padding: 3px 7px;
    font-size: 0.75rem;
    transition: background 0.15s;
    flex-shrink: 0;
}
.lw-quick-add button:hover { background: rgba(var(--accent-rgb), 0.35); }

/* Footer */
.lw-footer {
    display: flex;
    gap: 6px;
    margin-top: 8px;
}
.lw-footer-btn {
    flex: 1;
    background: rgba(var(--accent-rgb), 0.12);
    border: 1px solid rgba(var(--accent-rgb), 0.2);
    border-radius: 6px;
    color: var(--accent);
    font-size: 0.72rem;
    padding: 5px 8px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-family: inherit;
}
.lw-footer-btn:hover { background: rgba(var(--accent-rgb), 0.22); }
.lw-footer-btn-ghost {
    background: transparent;
    border-color: rgba(255,255,255,0.08);
    color: var(--muted);
}
.lw-footer-btn-ghost:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text);
}
</style>

<script>
(function() {
    // ── State ────────────────────────────────────────────────────────────
    let _lw_collapsed  = localStorage.getItem('hecos-lw-collapsed') === '1';
    let _lw_lists      = [];
    let _lw_activeId   = localStorage.getItem('hecos-lw-active') || null;
    let _lw_items      = [];

    // ── Collapse ─────────────────────────────────────────────────────────
    function _lwApplyCollapsed(yes) {
        const body = document.getElementById('lw-body');
        const tog  = document.getElementById('lw-toggle-icon');
        if (body) body.style.display = yes ? 'none' : '';
        if (tog)  tog.classList.toggle('collapsed', yes);
    }
    window._lwToggle = function() {
        _lw_collapsed = !_lw_collapsed;
        localStorage.setItem('hecos-lw-collapsed', _lw_collapsed ? '1' : '0');
        _lwApplyCollapsed(_lw_collapsed);
    };

    // ── Navigation ───────────────────────────────────────────────────────
    window._lwOpenFull = function() {
        if (typeof showTab === 'function') {
            showTab('lists');
        } else {
            window.open('/hecos/config/ui#lists', '_blank');
        }
    };

    // ── Fetch lists ──────────────────────────────────────────────────────
    async function _lwFetchLists() {
        try {
            const res  = await fetch('/api/lists');
            const data = await res.json();
            _lw_lists = (data.ok && data.lists) ? data.lists : [];
            _lwRenderNav();
            // if previously selected list still exists, refresh items
            if (_lw_activeId && _lw_lists.find(l => l.id === _lw_activeId)) {
                await _lwFetchItems(_lw_activeId);
            } else if (_lw_lists.length > 0 && !_lw_activeId) {
                // auto-select first list
                _lwSelectList(_lw_lists[0].id);
            } else if (_lw_lists.length === 0) {
                _lwShowPlaceholder();
            }
        } catch(e) {
            console.error('[LW] fetch lists error:', e);
        }
    }

    // ── Render nav ───────────────────────────────────────────────────────
    function _lwRenderNav() {
        const nav = document.getElementById('lw-nav');
        if (!nav) return;
        if (_lw_lists.length === 0) {
            nav.innerHTML = '<div class="lw-nav-empty">Nessuna lista</div>';
            return;
        }
        nav.innerHTML = _lw_lists.map(lst => {
            const active = lst.id === _lw_activeId ? ' active' : '';
            const count  = lst.pending_count || 0;
            const iconHtml = lst.icon || '<i class="fas fa-list-check"></i>';
            return `
            <div class="lw-nav-item${active}" onclick="_lwSelectList('${lst.id}')">
                <div class="lw-nav-icon">${iconHtml}</div>
                <div class="lw-nav-name" title="${_lwEsc(lst.name)}">${_lwEsc(lst.name)}</div>
                ${count > 0 ? `<div class="lw-nav-count">${count}</div>` : ''}
            </div>`;
        }).join('');
    }

    // ── Select list ──────────────────────────────────────────────────────
    window._lwSelectList = async function(id) {
        _lw_activeId = id;
        localStorage.setItem('hecos-lw-active', id);
        _lwRenderNav();
        await _lwFetchItems(id);
    };

    // ── Fetch items ──────────────────────────────────────────────────────
    async function _lwFetchItems(listId) {
        try {
            const res  = await fetch(`/api/lists/${listId}/items`);
            const data = await res.json();
            _lw_items = (data.ok && data.items) ? data.items : [];
            _lwRenderItems();
        } catch(e) {
            console.error('[LW] fetch items error:', e);
        }
    }

    // ── Render items ─────────────────────────────────────────────────────
    function _lwRenderItems() {
        const wrap = document.getElementById('lw-items-wrap');
        const placeholder = document.getElementById('lw-placeholder');
        const container   = document.getElementById('lw-items');
        if (!wrap || !container) return;

        placeholder.style.display = 'none';
        wrap.style.display = 'flex';

        if (_lw_items.length === 0) {
            container.innerHTML = '<div class="lw-items-empty"><i class="fas fa-check-circle" style="opacity:0.3;"></i><br>Lista vuota</div>';
            return;
        }

        container.innerHTML = _lw_items.map(item => {
            const done = item.status === 'done';
            return `
            <div class="lw-row${done ? ' done' : ''}" data-id="${item.id}">
                <input type="checkbox" ${done ? 'checked' : ''}
                       onchange="_lwToggleItem('${item.id}', this.checked, this.closest('.lw-row'))">
                <span class="lw-row-text">${_lwEsc(item.text)}</span>
                <button type="button" class="lw-row-del" onclick="_lwDelItem('${item.id}')" title="Rimuovi">
                    <i class="fas fa-times"></i>
                </button>
            </div>`;
        }).join('');
    }

    function _lwShowPlaceholder() {
        const wrap = document.getElementById('lw-items-wrap');
        const placeholder = document.getElementById('lw-placeholder');
        if (wrap) wrap.style.display = 'none';
        if (placeholder) placeholder.style.display = '';
    }

    // ── Toggle item ──────────────────────────────────────────────────────
    window._lwToggleItem = async function(itemId, checked, rowEl) {
        if (rowEl) rowEl.classList.toggle('done', checked);
        try {
            await fetch(`/api/lists/items/${itemId}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: checked ? 'done' : 'pending' })
            });
            await _lwFetchLists(); // refresh counts
        } catch(e) { console.error('[LW] toggle error:', e); }
    };

    // ── Delete item ──────────────────────────────────────────────────────
    window._lwDelItem = async function(itemId) {
        try {
            await fetch(`/api/lists/items/${itemId}`, { method: 'DELETE' });
            // optimistic removal
            _lw_items = _lw_items.filter(i => i.id !== itemId);
            _lwRenderItems();
            await _lwFetchLists();
        } catch(e) { console.error('[LW] del item error:', e); }
    };

    // ── Add item ─────────────────────────────────────────────────────────
    window._lwAddItem = async function() {
        if (!_lw_activeId) return;
        const input = document.getElementById('lw-add-input');
        const text  = input ? input.value.trim() : '';
        if (!text) return;
        input.value = '';
        try {
            const res = await fetch(`/api/lists/${_lw_activeId}/items`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            if (data.ok) {
                _lw_items.push(data.item);
                _lwRenderItems();
                await _lwFetchLists();
                // scroll to bottom
                const scrollEl = document.getElementById('lw-items');
                if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
            }
        } catch(e) { console.error('[LW] add item error:', e); }
    };

    // ── New list ─────────────────────────────────────────────────────────
    window._lwNewList = async function() {
        const name = prompt(window.t ? window.t('lists_prompt_name') : 'Nome della nuova lista:');
        if (!name || !name.trim()) return;
        try {
            const res = await fetch('/api/lists', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name.trim() })
            });
            const data = await res.json();
            if (data.ok) {
                await _lwFetchLists();
                _lwSelectList(data.list.id);
            }
        } catch(e) { console.error('[LW] new list error:', e); }
    };

    // ── Helpers ──────────────────────────────────────────────────────────
    function _lwEsc(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────────────
    function _lwInit() {
        _lwApplyCollapsed(_lw_collapsed);
        _lwFetchLists();
        setInterval(_lwFetchLists, 60000);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', _lwInit);
    } else {
        _lwInit();
    }
})();
</script>
