<script>
/**
 * Template Manager — Logic & Wiring
 * ─────────────────────────────────
 * Handles tab switching and panel bootstrap.
 * The TemplateManager object is defined in /assets/js/templates_api.js
 * which is loaded lazily if not already present on the page.
 */

/* ── Tab switcher ─────────────────────────────────────────────────────────── */
function tplSwitchTab(btn, targetId) {
  const tabBar = btn.closest('.tpl-tabs');
  const editor = btn.closest('.tpl-editor');
  if (!tabBar || !editor) return;

  tabBar.querySelectorAll('.tpl-tab').forEach(t => t.classList.remove('active'));
  editor.querySelectorAll('.tpl-tab-pane').forEach(p => {
    p.style.display = 'none';
    p.classList.remove('active');
  });

  btn.classList.add('active');
  const pane = document.getElementById(targetId);
  if (pane) {
    pane.style.display = 'flex';
    pane.classList.add('active');
  }
}

/* ── Lazy script loader ─────────────────────────────────────────────────────── */
function _tplLoadScript(src, onLoad) {
  if (document.querySelector(`script[src="${src}"]`)) {
    // Already in DOM — if TemplateManager is already defined just call onLoad
    if (typeof TemplateManager !== 'undefined') { onLoad?.(); }
    else {
      // Script tag exists but may not be executed yet (e.g. deferred). Poll briefly.
      let attempts = 0;
      const poll = setInterval(() => {
        if (typeof TemplateManager !== 'undefined') { clearInterval(poll); onLoad?.(); }
        else if (++attempts > 30) { clearInterval(poll); }
      }, 100);
    }
    return;
  }
  const s = document.createElement('script');
  s.src   = src;
  s.onload = onLoad;
  s.onerror = () => console.error('[Templates] Failed to load', src);
  document.head.appendChild(s);
}

/* ── Panel bootstrap ──────────────────────────────────────────────────────── */
(function bootstrapTemplatePanel() {
  // Guard: run only once even if the fragment is inserted multiple times
  if (window._tplPanelInitialized) {
    // Re-run init if the panel was inserted again (tab navigation)
    if (typeof TemplateManager !== 'undefined') TemplateManager.init();
    return;
  }
  window._tplPanelInitialized = true;

  function _run() {
    if (typeof TemplateManager === 'undefined') {
      console.error('[Templates] TemplateManager not found after script load.');
      return;
    }
    // Expose _activeId publicly for the delete button
    if (!('_activeId' in TemplateManager)) {
      Object.defineProperty(TemplateManager, '_activeId', {
        get: () => TemplateManager._internal_activeId,
        set: v  => { TemplateManager._internal_activeId = v;
                     const del = document.getElementById('tpl-delete-btn');
                     if (del) del.style.display = v ? '' : 'none'; },
        configurable: true,
      });
    }
    TemplateManager.init();
  }

  _tplLoadScript('/assets/js/templates_api.js', _run);
})();
</script>
