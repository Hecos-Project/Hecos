<!-- ═══════════════════════════════════════════════════════════════════════════
     Hecos Docs - Scoped Styles
     ══════════════════════════════════════════════════════════════════════════ -->
<style>
    :root {
        --sidebar-width: 300px;
    }

    body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        margin: 0;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* Sidebar Style */
    .docs-sidebar {
        width: var(--sidebar-width);
        background: var(--bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .sidebar-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 25px;
    }

    .sidebar-header img {
        width: 32px;
        height: 32px;
        object-fit: contain;
    }

    .sidebar-header .title {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 1px;
        color: var(--accent);
    }

    .nav-section {
        margin-bottom: 20px;
    }

    .nav-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--accent2);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
        padding-left: 10px;
        opacity: 0.7;
    }

    .nav-group-selector {
        display: flex;
        gap: 5px;
        margin-bottom: 20px;
        padding: 5px;
        background: var(--glass);
        border-radius: 8px;
        border: 1px solid var(--border);
    }

    .group-btn {
        flex: 1;
        padding: 8px;
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--muted);
        border: none;
        background: transparent;
    }

    .group-btn:hover { color: var(--text); }
    .group-btn.active {
        background: var(--bg2);
        color: var(--accent);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .chapter-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .chapter-item {
        display: block;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
        color: var(--muted);
        font-size: 13px;
        transition: all 0.2s;
        margin-bottom: 2px;
        border-left: 2px solid transparent;
    }

    .chapter-item:hover {
        color: var(--text);
        background: var(--glass);
    }

    .chapter-item.active {
        color: var(--accent);
        background: var(--glass-b);
        border-left-color: var(--accent);
        font-weight: 500;
    }

    /* Language Switcher */
    .lang-switcher {
        display: flex;
        gap: 5px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--border);
    }
    .lang-link {
        text-decoration: none;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 4px;
        background: var(--glass);
        transition: all 0.2s;
    }
    .lang-link:hover, .lang-link.active {
        color: var(--accent);
        background: rgba(var(--accent-rgb), 0.1);
    }

    /* Content Area */
    .search-container {
        margin: 15px 0;
        position: relative;
    }
    .search-input {
        width: 100%;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px 10px 35px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
    }
    .search-input:focus { border-color: var(--accent); background: var(--glass-b); }
    .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 14px;
    }

    .search-results-overlay {
        position: fixed;
        top: 0; left: var(--sidebar-width); right: 0; bottom: 0;
        background: var(--bg);
        z-index: 150;
        padding: 50px;
        display: none;
        overflow-y: auto;
    }
    .search-result-item {
        background: var(--bg2);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        cursor: pointer;
        transition: transform 0.2s;
        border: 1px solid var(--border);
    }
    .search-result-item:hover { transform: translateY(-3px); border-color: var(--accent); }
    .search-result-title { color: var(--accent); font-weight: 600; font-size: 18px; margin-bottom: 8px; }
    .search-result-snippet { color: var(--muted); font-size: 14px; line-height: 1.5; }
    .search-result-snippet b { color: var(--accent); background: var(--glass-c); padding: 0 2px; }

    .close-search {
        position: absolute;
        top: 30px; right: 40px;
        background: none; border: none; color: var(--muted);
        font-size: 24px; cursor: pointer;
    }
    .close-search:hover { color: var(--accent); }

    .docs-main {
        flex: 1;
        overflow-y: auto;
        padding: 40px 60px;
        box-sizing: border-box;
        background: radial-gradient(circle at top right, rgba(var(--accent-rgb), 0.03), transparent 400px);
        display: flex;
        flex-direction: column;
    }

    #content-target {
        max-width: 850px;
        margin: 0 auto 60px auto;
        width: 100%;
        line-height: 1.6;
    }

    /* Markdown Styles */
    #content-target h1 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 30px; }
    #content-target h2 { color: var(--accent2); margin-top: 45px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    #content-target h3 { color: var(--accent); filter: brightness(1.2); margin-top: 30px; }
    #content-target p { margin-bottom: 18px; color: var(--text); opacity: 0.9; }
    #content-target code { background: var(--glass-b); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: var(--accent); }
    #content-target pre { background: var(--bg); padding: 20px; border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); margin: 20px 0; }
    #content-target pre code { background: transparent; padding: 0; color: inherit; }
    #content-target blockquote { border-left: 4px solid var(--accent); background: var(--glass); margin: 25px 0; padding: 15px 25px; color: var(--muted); font-style: italic; }
    #content-target table { width: 100%; border-collapse: collapse; margin: 30px 0; font-size: 14px; }
    #content-target th, #content-target td { border: 1px solid var(--border); padding: 14px; text-align: left; }
    #content-target th { background: var(--glass); color: var(--accent); }
    #content-target img { max-width: 100%; border-radius: 12px; margin: 30px 0; box-shadow: var(--shadow); }

    /* Pagination Buttons */
    .pagination {
        max-width: 850px;
        margin: auto auto 40px auto;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding-top: 30px;
        border-top: 1px solid var(--border);
    }

    .pag-btn {
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: var(--muted);
        transition: all 0.2s;
        max-width: 45%;
    }

    .pag-btn:hover { color: var(--accent); }
    .pag-btn .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .pag-btn .title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pag-btn.prev { text-align: left; }
    .pag-btn.next { text-align: right; }

    .back-link {
        display: block;
        margin-top: 20px;
        padding: 10px;
        text-align: center;
        background: var(--glass);
        border-radius: 8px;
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.2s;
    }
    .back-link:hover { background: var(--surface2); color: var(--accent); }

    #loading-overlay {
        position: fixed;
        top: 0; left: var(--sidebar-width); right: 0; bottom: 0;
        background: var(--bg);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }

    @media (max-width: 900px) {
        :root { --sidebar-width: 240px; }
        .docs-main { padding: 30px; }
    }

    @media (max-width: 768px) {
        body { flex-direction: column; }
        .docs-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        .docs-main { padding: 20px; }
        #loading-overlay { left: 0; }
    }
</style>
