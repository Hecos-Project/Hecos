<!-- MAIL STYLES — Premium glassmorphism design aligned with Hecos design system -->
<style>
/* ── Mail Panel Layout ─────────────────────────────────────────────────────── */
#tab-mail {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-height: calc(100vh - 120px);
    gap: 0;
    padding: 0;
}

.mail-shell {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: 100%;
    min-height: 600px;
    background: var(--bg-blur, var(--bg));
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

/* ── Toolbar ───────────────────────────────────────────────────────────────── */
.mail-toolbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--glass-c);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    flex-wrap: wrap;
}

.mail-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
}
.mail-btn:hover {
    background: var(--glass-b);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
}
.mail-btn.primary {
    background: var(--accent-g);
    border-color: transparent;
    color: #fff;
}
.mail-btn.primary:hover {
    filter: brightness(1.15);
    box-shadow: var(--shadow-glow);
}
.mail-btn.danger {
    background: rgba(220, 38, 38, 0.15);
    border-color: rgba(220, 38, 38, 0.3);
    color: var(--red, #dc2626);
}
.mail-btn.danger:hover {
    background: rgba(220, 38, 38, 0.25);
}
.mail-btn:disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
}

.mail-search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
}
.mail-search {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-size: 0.83rem;
    outline: none;
    transition: border-color 0.2s;
}
.mail-search:focus {
    border-color: var(--accent);
    background: var(--bg3);
}
.mail-search-wrap::before {
    content: "\f002";
    font-family: "Font Awesome 5 Free";
    font-weight: 900;
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.75rem;
    pointer-events: none;
}

.mail-filter-btns {
    display: flex;
    gap: 6px;
}
.mail-filter-btn {
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
}
.mail-filter-btn.active,
.mail-filter-btn:hover {
    background: var(--glass-c);
    border-color: var(--accent);
    color: var(--accent);
}

.mail-spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: mail-spin 0.8s linear infinite;
    display: none;
}
.mail-spinner.active { display: block; }
@keyframes mail-spin { to { transform: rotate(360deg); } }

/* ── Sidebar ───────────────────────────────────────────────────────────────── */
.mail-sidebar {
    grid-row: 2;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 12px 0;
    overflow-y: auto;
}

.mail-folder-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--muted);
    font-size: 0.85rem;
    position: relative;
    border-left: 3px solid transparent;
}
.mail-folder-item:hover {
    background: var(--glass);
    color: var(--text);
}
.mail-folder-item.active {
    background: var(--glass-c);
    color: var(--accent);
    border-left-color: var(--accent);
}
.mail-folder-icon { width: 16px; text-align: center; }
.mail-folder-label { flex: 1; font-weight: 500; }
.mail-folder-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    min-width: 20px;
    text-align: center;
}
.mail-folder-badge:empty { display: none; }

.mail-sidebar-section {
    padding: 10px 18px 4px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
}

/* ── Message List ──────────────────────────────────────────────────────────── */
.mail-content {
    grid-row: 2;
    display: grid;
    grid-template-columns: 1fr;
    overflow: hidden;
    background: var(--bg);
}
.mail-content.with-preview {
    grid-template-columns: 1fr 420px;
}

.mail-list-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.mail-list-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
}

.mail-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
}

.mail-msg-row {
    display: grid;
    grid-template-columns: 34px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.18s;
    position: relative;
}
.mail-msg-row:hover {
    background: var(--glass);
}
.mail-msg-row.active {
    background: var(--glass-b);
}
.mail-msg-row.unread .mail-msg-subject {
    font-weight: 700;
    color: var(--text);
}
.mail-msg-row.unread::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
}

.mail-msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent-g);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    text-transform: uppercase;
}

.mail-msg-body { overflow: hidden; }
.mail-msg-from {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.mail-msg-subject {
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
    opacity: 0.9;
}
.mail-msg-preview {
    font-size: 0.74rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.mail-msg-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
}
.mail-msg-date {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
}
.mail-msg-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.18s;
}
.mail-msg-row:hover .mail-msg-actions { opacity: 1; }
.mail-msg-action-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 3px;
    border-radius: 4px;
    transition: color 0.15s;
}
.mail-msg-action-btn:hover { color: var(--accent); }
.mail-star-btn.starred { color: var(--yellow, #f59e0b) !important; }

/* ── Preview Panel ─────────────────────────────────────────────────────────── */
.mail-preview {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
}

.mail-preview-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
}
.mail-preview-subject {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
}
.mail-preview-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.78rem;
    color: var(--muted);
}
.mail-preview-meta strong { color: var(--text); }
.mail-preview-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

.mail-preview-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
}
.mail-preview-body-text {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
}
.mail-preview-body iframe {
    width: 100%;
    min-height: 400px;
    border: none;
    background: #fff;
    border-radius: 8px;
}

.mail-preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
}
.mail-preview-empty i { font-size: 2.5rem; opacity: 0.5; }

/* ── Empty State ───────────────────────────────────────────────────────────── */
.mail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 14px;
    color: var(--muted);
}
.mail-empty i { font-size: 3rem; opacity: 0.4; }
.mail-empty-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.mail-empty-sub { font-size: 0.8rem; opacity: 0.8; }
</style>
