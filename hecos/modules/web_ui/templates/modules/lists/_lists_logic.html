<script>
let listsCurrentFilter = 'all';
let listsActiveListId = null;
let listsAllData = [];
let listsCategories = [];

function listsFmtDate(iso) {
    if (!iso) return '';
    try {
        const d = new Date(iso);
        return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
    } catch(e) { return iso.slice(0,10); }
}

function listsInit() {
    listsFetchCategories();
    listsFetchLists();
    if (typeof listsHubRenderInlineLabels === 'function') listsHubRenderInlineLabels();
}

async function listsFetchCategories() {
    try {
        const res = await fetch('/api/lists/categories');
        const data = await res.json();
        if (data.ok) {
            listsCategories = data.categories;
            const dl = document.getElementById('lists-categories-datalist');
            dl.innerHTML = '';
            listsCategories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.name;
                dl.appendChild(opt);
            });
        }
    } catch (e) {
        console.error("Error fetching categories", e);
    }
}

async function listsFetchLists() {
    try {
        const res = await fetch('/api/lists');
        const data = await res.json();
        if (data.ok) {
            listsAllData = data.lists;
            listsRenderSidebar();
        }
    } catch (e) {
        console.error("Error fetching lists", e);
    }
}

function listsRenderSidebar() {
    const container = document.getElementById('lists-sidebar-list');
    const emptyMsg = document.getElementById('lists-sidebar-empty');
    const q = document.getElementById('lists-search-input').value.toLowerCase();
    
    // Clear old items except emptyMsg
    Array.from(container.children).forEach(c => {
        if (c.id !== 'lists-sidebar-empty') c.remove();
    });
    
    const filtered = listsAllData.filter(l => l.name.toLowerCase().includes(q));
    
    if (filtered.length === 0) {
        emptyMsg.style.display = 'block';
    } else {
        emptyMsg.style.display = 'none';
        filtered.forEach((lst, idx) => {
            const div = document.createElement('div');
            div.className = 'lists-item-nav';
            div.tabIndex = 0;
            div.dataset.id = lst.id;
            div.dataset.idx = idx;
            if (lst.id === listsActiveListId) div.classList.add('active');

            const dateStr = lst.created_at ? listsFmtDate(lst.created_at) : '';

            div.innerHTML = `
                <span class="nav-icon">${lst.icon || '<i class="fas fa-list-check"></i>'}</span>
                <span class="nav-name">${lst.name}</span>
                ${dateStr ? `<span class="nav-date">${dateStr}</span>` : ''}
                <span class="nav-count">${lst.pending_count || 0}</span>
            `;
            div.onclick = () => listsSelectList(lst.id);
            div.onkeydown = (e) => listsNavKeydown(e, lst.id, idx);
            container.appendChild(div);
        });
    }
}

function listsSearchSidebar() {
    listsRenderSidebar();
}

async function listsSelectList(id) {
    listsActiveListId = id;
    listsRenderSidebar(); // update active class
    
    const lst = listsAllData.find(l => l.id === id);
    if (!lst) return;
    
    document.getElementById('lists-content-empty').style.display = 'none';
    document.getElementById('lists-content-active').style.display = 'flex';
    document.getElementById('lists-btn-cleardone').style.display = 'inline-flex';
    
    document.getElementById('lists-active-icon').innerHTML = lst.icon || '<i class="fas fa-list-check"></i>';
    document.getElementById('lists-active-name').innerText = lst.name;
    
    await listsFetchItems();
}

async function listsFetchItems() {
    if (!listsActiveListId) return;
    try {
        const url = listsCurrentFilter === 'all' 
            ? `/api/lists/${listsActiveListId}/items` 
            : `/api/lists/${listsActiveListId}/items?status=${listsCurrentFilter}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok) {
            listsRenderItems(data.items);
        }
    } catch (e) {
        console.error("Error fetching items", e);
    }
}

function listsRenderItems(items) {
    const container = document.getElementById('lists-items-container');
    container.innerHTML = '';
    
    items.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'list-item-row';
        row.dataset.id = item.id;
        row.dataset.idx = idx;
        row.tabIndex = 0;
        if (item.status === 'done') row.classList.add('is-done');
        
        let badgesHtml = '';
        if (item.priority > 0) {
            const pClass = item.priority === 1 ? 'badge-p1' : 'badge-p2';
            const pText = item.priority === 1 ? 'P1' : 'P2';
            badgesHtml += `<span class="item-badge ${pClass}">${pText}</span>`;
        }
        if (item.label) {
            badgesHtml += `<span class="item-badge" style="display:inline-flex; align-items:center; gap:4px;">
                              <i class="fas fa-tag"></i> ${item.label}
                              <button type="button" onclick="event.stopPropagation(); listsRemoveLabelFromItem('${item.id}')"
                                      style="background:none; border:none; color:inherit; opacity:0.6; cursor:pointer; padding:0; margin-left:2px; display:flex;">
                                  <i class="fas fa-times"></i>
                              </button>
                           </span>`;
        }

        // Build dates block
        let datesHtml = '';
        const createdStr = item.created_at ? listsFmtDate(item.created_at) : '';
        const completedStr = item.completed_at ? listsFmtDate(item.completed_at) : '';
        if (createdStr || completedStr) {
            datesHtml = '<div class="list-item-dates">';
            if (createdStr)   datesHtml += `<span><i class="fas fa-calendar-plus" style="font-size:0.65rem;"></i> ${createdStr}</span>`;
            if (completedStr) datesHtml += `<span><i class="fas fa-calendar-check" style="font-size:0.65rem; color:var(--accent);"></i> ${completedStr}</span>`;
            datesHtml += '</div>';
        }
        
        row.innerHTML = `
            <div class="list-item-drag"><i class="fas fa-grip-vertical"></i></div>
            <div class="list-item-check">
                <input type="checkbox" ${item.status === 'done' ? 'checked' : ''} onchange="listsToggleItem('${item.id}', this.checked, this.parentElement.parentElement)">
            </div>
            <div class="list-item-content">
                <div class="list-item-text" contenteditable="true" onblur="listsUpdateItemText('${item.id}', this.innerText)">${item.text}</div>
                ${badgesHtml ? `<div class="list-item-meta">${badgesHtml}</div>` : ''}
                ${datesHtml}
            </div>
            <div class="list-item-actions">
                <button type="button" class="btn btn-sm btn-icon text-danger" onclick="listsDeleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        `;
        
        // Keyboard handler
        row.onkeydown = (e) => listsItemKeydown(e, item.id, idx);
        
        // Setup drag and drop events
        row.draggable = true;
        row.addEventListener('dragstart', handleDragStart);
        row.addEventListener('dragover', handleDragOver);
        row.addEventListener('drop', handleDrop);
        row.addEventListener('dragenter', handleDragEnter);
        row.addEventListener('dragleave', handleDragLeave);
        row.addEventListener('dragend', handleDragEnd);
        
        container.appendChild(row);
    });
}

// ── CRUD ──────────────────────────────────────────────────────────────────────

async function listsCreateList() {
    const input = document.getElementById('lists-new-name-input');
    const name  = input ? input.value.trim() : '';
    if (!name) {
        if (input) input.focus();
        return;
    }
    if (input) input.value = '';
    try {
        const res = await fetch('/api/lists', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, icon: '<i class="fas fa-list-check"></i>' })
        });
        const data = await res.json();
        if (data.ok) {
            await listsFetchLists();
            listsSelectList(data.list.id);
        }
    } catch (e) {
        console.error(e);
    }
}

async function listsAddItem() {
    if (!listsActiveListId) return;
    const input = document.getElementById('lists-add-input');
    const prio = document.getElementById('lists-add-priority').value;
    const label = document.getElementById('lists-add-label').value;
    const text = input.value.trim();
    
    if (!text) return;
    input.value = '';
    
    try {
        const res = await fetch(`/api/lists/${listsActiveListId}/items`, {
            method: 'POST',
            body: JSON.stringify({ text: text, priority: prio, label: label })
        });
        if (res.ok) {
            await listsFetchItems();
            await listsFetchLists(); // update counts
        }
    } catch (e) {
        console.error(e);
    }
}

async function listsToggleItem(itemId, isChecked, rowElement) {
    if (isChecked) rowElement.classList.add('anim-check');
    try {
        await fetch(`/api/lists/items/${itemId}`, {
            method: 'PATCH',
            body: JSON.stringify({ status: isChecked ? 'done' : 'pending' })
        });
        await listsFetchLists(); // update count
        if (listsCurrentFilter !== 'all') {
            setTimeout(() => listsFetchItems(), 300); // refresh list
        } else {
            setTimeout(() => {
                rowElement.classList.remove('anim-check');
                if (isChecked) rowElement.classList.add('is-done');
                else rowElement.classList.remove('is-done');
            }, 300);
        }
    } catch (e) {
        console.error(e);
    }
}

async function listsUpdateItemText(itemId, newText) {
    if (!newText.trim()) return;
    try {
        await fetch(`/api/lists/items/${itemId}`, {
            method: 'PATCH',
            body: JSON.stringify({ text: newText.trim() })
        });
    } catch (e) {
        console.error(e);
    }
}

async function listsDeleteItem(itemId) {
    if (!confirm(window.t ? window.t('lists_confirm_del_item') : "Eliminare l'elemento?")) return;
    try {
        await fetch(`/api/lists/items/${itemId}`, { method: 'DELETE' });
        await listsFetchItems();
        await listsFetchLists();
    } catch (e) {
        console.error(e);
    }
}

async function listsRemoveLabelFromItem(itemId) {
    try {
        await fetch(`/api/lists/items/${itemId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ label: '' }) // Clear label
        });
        listsFetchItems();
    } catch (e) {
        console.error("Error removing item label", e);
    }
}

async function listsClearDone() {
    if (!listsActiveListId) return;
    if (!confirm(window.t ? window.t('lists_confirm_clear') : "Rimuovere tutti gli elementi completati?")) return;
    try {
        await fetch(`/api/lists/${listsActiveListId}/clear_done`, { method: 'POST' });
        await listsFetchItems();
    } catch (e) {
        console.error(e);
    }
}

async function listsRenameList(newName) {
    if (!listsActiveListId || !newName.trim()) return;
    try {
        await fetch(`/api/lists/${listsActiveListId}`, {
            method: 'PATCH',
            body: JSON.stringify({ name: newName.trim() })
        });
        await listsFetchLists();
    } catch (e) {
        console.error(e);
    }
}

async function listsChangeIcon() {
    if (!listsActiveListId) return;
    const newIcon = prompt(window.t ? window.t('lists_prompt_icon') : "Inserisci una nuova emoji per l'icona:");
    if (!newIcon) return;
    try {
        await fetch(`/api/lists/${listsActiveListId}`, {
            method: 'PATCH',
            body: JSON.stringify({ icon: newIcon.trim() })
        });
        document.getElementById('lists-active-icon').innerHTML = newIcon;
        await listsFetchLists();
    } catch (e) {
        console.error(e);
    }
}

async function listsArchiveActive() {
    if (!listsActiveListId) return;
    if (!confirm(window.t ? window.t('lists_confirm_archive') : "Archiviare la lista?")) return;
    try {
        await fetch(`/api/lists/${listsActiveListId}`, {
            method: 'PATCH',
            body: JSON.stringify({ archived: 1 })
        });
        listsActiveListId = null;
        document.getElementById('lists-content-empty').style.display = 'flex';
        document.getElementById('lists-content-active').style.display = 'none';
        document.getElementById('lists-btn-cleardone').style.display = 'none';
        await listsFetchLists();
    } catch (e) {
        console.error(e);
    }
}

async function listsDeleteActive() {
    if (!listsActiveListId) return;
    if (!confirm(window.t ? window.t('lists_confirm_delete_list') : "Eliminare definitivamente la lista e tutti i suoi elementi?")) return;
    try {
        await fetch(`/api/lists/${listsActiveListId}`, { method: 'DELETE' });
        listsActiveListId = null;
        document.getElementById('lists-content-empty').style.display = 'flex';
        document.getElementById('lists-content-active').style.display = 'none';
        document.getElementById('lists-btn-cleardone').style.display = 'none';
        await listsFetchLists();
    } catch (e) {
        console.error(e);
    }
}

function listsExportActive() {
    if (!listsActiveListId) return;
    // Uses the default YAML format, which can also be used by the AI to email the list
    window.location.href = `/api/lists/${listsActiveListId}/export?format=yaml`;
}

function listsSetFilter(filter) {
    listsCurrentFilter = filter;
    document.querySelectorAll('.lists-filter-btn').forEach(btn => {
        if (btn.dataset.filter === filter) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    listsFetchItems();
}

// ── Keyboard Navigation (Hub) ─────────────────────────────────────────────

function listsNavKeydown(e, listId, idx) {
    const container = document.getElementById('lists-sidebar-list');
    const navItems = Array.from(container.querySelectorAll('.lists-item-nav'));
    switch (e.key) {
        case 'ArrowDown':
            e.preventDefault();
            if (idx + 1 < navItems.length) navItems[idx + 1].focus();
            break;
        case 'ArrowUp':
            e.preventDefault();
            if (idx > 0) navItems[idx - 1].focus();
            break;
        case 'Enter':
        case ' ':
            e.preventDefault();
            listsSelectList(listId);
            setTimeout(() => {
                const firstRow = document.querySelector('#lists-items-container .list-item-row');
                if (firstRow) firstRow.focus();
            }, 200);
            break;
        case 'ArrowRight':
            e.preventDefault();
            setTimeout(() => {
                const firstRow = document.querySelector('#lists-items-container .list-item-row');
                if (firstRow) firstRow.focus();
            }, 100);
            break;
    }
}

function listsItemKeydown(e, itemId, idx) {
    const container = document.getElementById('lists-items-container');
    const rows = Array.from(container.querySelectorAll('.list-item-row'));
    const row = rows[idx];
    switch (e.key) {
        case 'ArrowDown':
            e.preventDefault();
            if (idx + 1 < rows.length) rows[idx + 1].focus();
            break;
        case 'ArrowUp':
            e.preventDefault();
            if (idx > 0) {
                rows[idx - 1].focus();
            } else {
                // Go back to sidebar
                const activeNav = document.querySelector('#lists-sidebar-list .lists-item-nav.active');
                if (activeNav) activeNav.focus();
            }
            break;
        case ' ':
        case 'Enter':
            // Only if not in a text editing element
            if (e.target.tagName === 'DIV' && e.target.contentEditable !== 'true') {
                e.preventDefault();
                if (row) {
                    const cb = row.querySelector('input[type="checkbox"]');
                    if (cb) {
                        cb.checked = !cb.checked;
                        listsToggleItem(itemId, cb.checked, row);
                    }
                }
            }
            break;
        case 'ArrowLeft':
            e.preventDefault();
            const activeNav = document.querySelector('#lists-sidebar-list .lists-item-nav.active');
            if (activeNav) activeNav.focus();
            break;
        case 'Delete':
            if (e.target.tagName !== 'INPUT' && e.target.contentEditable !== 'true') {
                e.preventDefault();
                listsDeleteItem(itemId);
            }
            break;
    }
}

// ── Drag & Drop ──────────────────────────────────────────────────────────────

let dragSrcEl = null;

function handleDragStart(e) {
    dragSrcEl = this;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', this.innerHTML);
    setTimeout(() => this.classList.add('dragging'), 0);
}

function handleDragOver(e) {
    if (e.preventDefault) e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    return false;
}

function handleDragEnter(e) {
    this.style.borderTop = "2px solid var(--primary-color)";
}

function handleDragLeave(e) {
    this.style.borderTop = "";
}

function handleDrop(e) {
    if (e.stopPropagation) e.stopPropagation();
    if (dragSrcEl !== this) {
        const container = document.getElementById('lists-items-container');
        const items = Array.from(container.querySelectorAll('.list-item-row'));
        const srcIndex = items.indexOf(dragSrcEl);
        const tgtIndex = items.indexOf(this);
        
        if (srcIndex < tgtIndex) {
            container.insertBefore(dragSrcEl, this.nextSibling);
        } else {
            container.insertBefore(dragSrcEl, this);
        }
        listsSaveOrder();
    }
    this.style.borderTop = "";
    return false;
}

function handleDragEnd(e) {
    this.classList.remove('dragging');
    const container = document.getElementById('lists-items-container');
    container.querySelectorAll('.list-item-row').forEach(r => r.style.borderTop = "");
}

async function listsSaveOrder() {
    if (!listsActiveListId) return;
    const container = document.getElementById('lists-items-container');
    const orderedIds = Array.from(container.querySelectorAll('.list-item-row')).map(r => r.dataset.id);
    try {
        await fetch(`/api/lists/${listsActiveListId}/reorder`, {
            method: 'POST',
            body: JSON.stringify({ ordered_ids: orderedIds })
        });
    } catch (e) {
        console.error("Error saving order", e);
    }
}

// Setup — called by showTab('lists') in config_core_navigation.js
// Guard to prevent double-init on subsequent tab switches
let _listsInitialized = false;
const _listsInitOrig = listsInit;
listsInit = function() {
    if (!_listsInitialized) {
        _listsInitialized = true;
    }
    _listsInitOrig();
};
</script>
