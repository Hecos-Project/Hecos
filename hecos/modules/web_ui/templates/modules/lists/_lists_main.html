<div class="lists-container">
    <div class="lists-sidebar">
        <div class="lists-search">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="lists-search-input" placeholder="Cerca lista..." onkeyup="listsSearchSidebar()">
            </div>
        </div>
        <div class="lists-list" id="lists-sidebar-list">
            <!-- Populated via JS -->
            <div class="lists-empty-msg" id="lists-sidebar-empty" style="display:none;">Nessuna lista trovata.</div>
        </div>
    </div>
    
    <div class="lists-content">
        <div id="lists-content-empty" class="lists-content-placeholder">
            <div class="placeholder-icon"><i class="fas fa-list-ul"></i></div>
            <h3>Seleziona una lista</h3>
            <p>Scegli una lista dalla barra laterale o creane una nuova.</p>
        </div>
        
        <div id="lists-content-active" class="lists-content-active" style="display:none;">
            <div class="lists-content-header">
                <div class="lists-header-title">
                    <span id="lists-active-icon" class="list-icon" onclick="listsChangeIcon()">📋</span>
                    <h3 id="lists-active-name" contenteditable="true" onblur="listsRenameList(this.innerText)">Nome Lista</h3>
                </div>
                <div class="lists-header-actions">
                    <button class="btn btn-icon btn-outline lists-btn-archive" onclick="listsArchiveActive()" title="Archivia lista"><i class="fas fa-box-archive"></i></button>
                    <button class="btn btn-icon btn-outline text-danger" onclick="listsDeleteActive()" title="Elimina lista"><i class="fas fa-trash"></i></button>
                </div>
            </div>
            
            <div class="lists-add-bar">
                <input type="text" id="lists-add-input" placeholder="Aggiungi elemento... (Premi Invio)" onkeydown="if(event.key === 'Enter') listsAddItem()">
                <div class="lists-add-options">
                    <select id="lists-add-priority" class="lists-select" title="Priorità">
                        <option value="0">P0 (Normale)</option>
                        <option value="1">P1 (Alta)</option>
                        <option value="2">P2 (Urgente)</option>
                    </select>
                    <input type="text" id="lists-add-label" placeholder="Etichetta" class="lists-input-small" list="lists-categories-datalist">
                    <datalist id="lists-categories-datalist"></datalist>
                    <button class="btn btn-sm" onclick="listsAddItem()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            
            <div class="lists-items-filters">
                <button class="lists-filter-btn active" data-filter="all" onclick="listsSetFilter('all')">Tutti</button>
                <button class="lists-filter-btn" data-filter="pending" onclick="listsSetFilter('pending')">Da fare</button>
                <button class="lists-filter-btn" data-filter="done" onclick="listsSetFilter('done')">Completati</button>
            </div>
            
            <div class="lists-items-container" id="lists-items-container">
                <!-- Items populated via JS -->
            </div>
        </div>
    </div>
</div>

<!-- Modal for Icon Picker or New List could be added here if needed, 
     but we'll use prompt() for simplicity or a custom small modal. -->
