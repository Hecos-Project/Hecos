<style>
:root { color-scheme: dark; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@media (max-width: 768px) {
    header {
    flex-direction: column;
    height: auto;
    padding: 8px 12px;
    gap: 6px;
    }
    header .logo {
    justify-content: center;
    margin-bottom: 2px;
    }
    header .logo-text { font-size: 16px; }
    header .logo img { height: 24px; }
    
    header > div:last-child {
    flex-wrap: nowrap;
    justify-content: center;
    gap: 4px;
    width: 100%;
    overflow-x: auto;
    padding-bottom: 4px;
    }
    header .btn, header .view-switcher, header .global-controls {
    padding: 4px 8px !important;
    font-size: 11px !important;
    height: 28px;
    display: flex;
    align-items: center;
    }
    header .view-switcher button, header .global-controls button {
    padding: 0 6px !important;
    font-size: 11px !important;
    }

    /* Fix Save Bar (Footer) */
    .save-bar {
    padding: 8px 12px !important;
    gap: 6px !important;
    height: auto !important;
    }
    .save-bar .btn {
    padding: 6px 10px !important;
    font-size: 11px !important;
    flex: 1;
    white-space: nowrap;
    }
    #save-msg { font-size: 10px; margin-bottom: 4px; width: 100%; text-align: center; }

    .tabs {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    gap: 4px;
    padding-bottom: 4px;
    }
    .tab {
    flex-shrink: 0;
    font-size: 11px;
    padding: 6px 10px;
    white-space: nowrap;
    }
    .container {
    padding: 8px;
    margin-bottom: 80px; /* Space for save-bar */
    }
    .card { padding: 12px !important; margin-bottom: 12px !important; }
    .grid-2 { grid-template-columns: 1fr !important; }
}
</style>
