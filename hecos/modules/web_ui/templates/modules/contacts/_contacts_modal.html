<!-- CONTACTS: New / Edit Modal -->
<div id="contact-modal" class="modal-overlay" aria-modal="true" role="dialog">
    <div class="card contact-modal-card">
        <div class="card-title" id="contact-modal-title">{{ t('ext_contacts_modal_title') }}</div>
        <button class="contact-modal-close" onclick="contactsUI.closeForm()" aria-label="Close">
            <i class="fas fa-times"></i>
        </button>

        <input type="hidden" id="c-id">

        <!-- Photo upload -->
        <div class="field contact-photo-section">
            <div id="c-photo-preview" class="contact-avatar-preview">
                <i class="fas fa-user contact-avatar-icon"></i>
            </div>
            <div>
                <label
                    style="font-size:12px; color:var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">{{
                    t('ext_contacts_photo') }}</label>
                <input type="file" id="c-photo-input" accept="image/*" style="display:none;"
                    onchange="contactsUI.previewPhoto(this)">
                <div style="display:flex; gap:8px; margin-top:6px;">
                    <button class="btn btn-secondary" style="font-size:11px; padding:4px 10px;"
                        onclick="document.getElementById('c-photo-input').click()">
                        <i class="fas fa-camera"></i> {{ t('label_change_avatar') }}
                    </button>
                    <button class="btn btn-secondary" style="font-size:11px; padding:4px 10px; color:var(--muted);"
                        onclick="contactsUI.clearPhoto()" id="c-photo-clear" style="display:none;">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Name Row -->
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;">
                <label>{{ t('ext_contacts_name') }} *</label>
                <input type="text" id="c-name" class="form-control" autocomplete="given-name">
            </div>
            <div class="field" style="flex:1;">
                <label>{{ t('ext_contacts_lastname') }}</label>
                <input type="text" id="c-lastname" class="form-control" autocomplete="family-name">
            </div>
        </div>

        <!-- Display Name -->
        <div class="field">
            <label>{{ t('ext_contacts_display') }} <small style="color:var(--muted);">({{ t('option_auto') or 'auto'
                    }})</small></label>
            <input type="text" id="c-display" class="form-control" placeholder="Es. Mario Rossi">
        </div>

        <!-- Address Row (New) -->
        <div class="field">
            <label><i class="fas fa-map-marker-alt" style="color:var(--muted); width:14px;"></i> {{ t('ext_contacts_address') or 'Address' }}</label>
            <input type="text" id="c-address" class="form-control" placeholder="Via Roma 1, Milano">
        </div>

        <!-- Phone List -->
        <div style="margin-bottom:16px;">
            <label style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:block;">
                <i class="fas fa-phone" style="width:14px;"></i> {{ t('ext_contacts_phone') }}
            </label>
            <div id="c-phones-container" style="display:flex; flex-direction:column; gap:6px; margin-bottom:8px;"></div>
            <button class="btn btn-sm btn-secondary" onclick="contactsUI.addPhoneField()" style="width:100%; border-style:dashed;">
                <i class="fas fa-plus"></i> {{ t('ext_contacts_add_phone') or 'Add Phone' }}
            </button>
        </div>

        <!-- Email List -->
        <div style="margin-bottom:16px;">
            <label style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:block;">
                <i class="fas fa-envelope" style="width:14px;"></i> {{ t('ext_contacts_email') }}
            </label>
            <div id="c-emails-container" style="display:flex; flex-direction:column; gap:6px; margin-bottom:8px;"></div>
            <button class="btn btn-sm btn-secondary" onclick="contactsUI.addEmailField()" style="width:100%; border-style:dashed;">
                <i class="fas fa-plus"></i> {{ t('ext_contacts_add_email') or 'Add Email' }}
            </button>
        </div>

        <!-- Company / Role -->
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;">
                <label><i class="fas fa-building" style="color:var(--muted); width:14px;"></i> {{
                    t('ext_contacts_company') }}</label>
                <input type="text" id="c-company" class="form-control">
            </div>
            <div class="field" style="flex:1;">
                <label><i class="fas fa-user-tag" style="color:var(--muted); width:14px;"></i> {{ t('ext_contacts_role')
                    }}</label>
                <input type="text" id="c-role" class="form-control">
            </div>
        </div>

        <!-- Birthday / Tags -->
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;">
                <label><i class="fas fa-gift" style="color:var(--muted); width:14px;"></i> {{ t('ext_contacts_birthday')
                    }}</label>
                <input type="date" id="c-birthday" class="form-control">
            </div>
            <div class="field" style="flex:1;">
                <label><i class="fas fa-tags" style="color:var(--muted); width:14px;"></i> {{ t('ext_contacts_tags')
                    }}</label>
                <input type="text" id="c-tags" class="form-control" placeholder="vip, lavoro, admin">
            </div>
        </div>

        <!-- Notes -->
        <div class="field">
            <label><i class="fas fa-sticky-note" style="color:var(--muted); width:14px;"></i> {{ t('ext_contacts_notes')
                }}</label>
            <textarea id="c-notes" class="form-control" rows="2" style="resize:vertical;"></textarea>
        </div>

        <!-- Label Color (Aesthetic Picker) -->
        <div class="field">
            <label><i class="fas fa-palette" style="color:var(--muted); width:14px;"></i> {{ t('ext_contacts_color')
                }}</label>
            <div id="c-color-picker-container" class="contact-color-picker-wrap"></div>
        </div>

        <!-- Actions -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
            <div>
                <button class="btn btn-secondary" onclick="contactsUI.exportSingle()" id="btn-contact-export" style="display:none;" title="Export Contact">
                    <i class="fas fa-file-export"></i> {{ t('ext_contacts_btn_export') or 'Export' }}
                </button>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="contactsUI.closeForm()">{{ t('ext_contacts_btn_cancel') }}</button>
                <button class="btn btn-primary" onclick="contactsUI.save()"><i class="fas fa-save"></i> {{ t('ext_contacts_btn_save') }}</button>
            </div>
        </div>
    </div>
</div>
