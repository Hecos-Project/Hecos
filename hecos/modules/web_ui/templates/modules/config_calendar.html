<!-- ═══════════════════════════════════════════════════════════════════════════
     Hecos Calendar — Full Config Panel
     Loaded via the main index.html under the "calendar" section tab.
     Embeds FullCalendar.js + HecosWheelPicker inline.
     ══════════════════════════════════════════════════════════════════════════ -->

<!-- FullCalendar + Wheel Picker + Calendar CSS -->
<script src="/ext/calendar/static/js/fullcalendar.min.js"></script>
<script src="/ext/calendar/static/js/hecos_wheel_picker.js"></script>
<link  rel="stylesheet" href="/ext/calendar/static/css/calendar.css">

<!-- Event Detail Popup (hidden) -->
<div id="cal-event-popup" style="display:none;"></div>

<div id="tab-calendar" class="panel">
<div class="card" style="padding:20px; margin-bottom:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0; display:inline-flex; align-items:center; gap:8px;">Calendar</div>
        <div style="display:flex; gap:12px; font-size:12px; font-weight:normal; align-items:center;">
            <label style="color:var(--muted); display:flex; align-items:center; gap:6px;">Format: 
                <select id="cal-set-locale" onchange="hcal.saveSettings()" style="background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:4px; padding:2px; cursor:pointer; font-size:12px;">
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="it">Italiano</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                </select>
            </label>
            <label style="color:var(--muted); display:flex; align-items:center; gap:6px;">Holidays: 
                <select id="cal-set-country" onchange="hcal.saveSettings()" style="background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:4px; padding:2px; cursor:pointer; font-size:12px;">
                    <option value="US">🇺🇸 USA</option>
                    <option value="GB">🇬🇧 UK</option>
                    <option value="IT">🇮🇹 Italy</option>
                    <option value="ES">🇪🇸 Spain</option>
                    <option value="FR">🇫🇷 France</option>
                    <option value="DE">🇩🇪 Germany</option>
                </select>
            </label>
            <button onclick="hcal.toggleColorSettings()" id="cal-btn-colors" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--muted); border-radius:4px; padding:3px 8px; cursor:pointer; font-size:12px;">🎨 Colors</button>
        </div>
    </div>

    <!-- Day Colors Settings (Expansion) -->
    <div id="cal-color-settings" style="display:none; background:rgba(0,0,0,0.2); border-radius:8px; padding:12px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.05);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div style="font-size:12px; color:var(--muted); font-weight:bold;">Day Background Colors</div>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:10px;">
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Sun</label>
                <input type="color" id="color-day-0" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Mon</label>
                <input type="color" id="color-day-1" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Tue</label>
                <input type="color" id="color-day-2" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Wed</label>
                <input type="color" id="color-day-3" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Thu</label>
                <input type="color" id="color-day-4" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Fri</label>
                <input type="color" id="color-day-5" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
                <label style="font-size:11px;">Sat</label>
                <input type="color" id="color-day-6" oninput="hcal.handleColorInput()" style="width:24px; height:24px; border:none; background:none; cursor:pointer;">
            </div>
        </div>
        <div style="font-size:10px; color:rgba(255,255,255,0.3); margin-top:8px;">* Selections are saved automatically after a short delay.</div>
    </div>

    <!-- Toolbar: view switcher + Add Event button -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:10px; flex-wrap:wrap;">
        <div style="display:flex; gap:8px;">
            <button onclick="hcal.setView('dayGridMonth')"  id="cal-btn-month"  class="cal-view-btn active-view">Month</button>
            <button onclick="hcal.setView('timeGridWeek')"  id="cal-btn-week"   class="cal-view-btn">Week</button>
            <button onclick="hcal.setView('listWeek')"      id="cal-btn-list"   class="cal-view-btn">List</button>
        </div>
        <button onclick="hcal.openNewEventForm()"
                style="background:rgba(52,152,219,0.15);border:1px solid rgba(52,152,219,0.35);color:#3498db;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:700;">
            ＋ Add Event
        </button>
    </div>

    <!-- FullCalendar mount point -->
    <div id="hecos-fullcalendar" style="min-height:600px;"></div>
    <div id="cal-sync-status" style="margin-top:12px; font-size:11px; color:#2ecc71; opacity:0; transition:opacity 0.3s; text-align:right;">
        <span style="display:inline-flex; align-items:center; gap:4px;">✔ Synced</span>
    </div>
</div>

<!-- Add Event Form Card (visible when user clicks + Add Event) -->
<div class="card" id="cal-add-form" style="padding:20px; display:none;">
    <div id="cal-form-title" class="card-title" style="margin-bottom:14px;">➕ New Event</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Title *</label>
            <input id="cal-f-title" type="text" class="form-control" placeholder="Event title" autocomplete="off">
        </div>
        <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Start *</label>
            <div style="display:flex;gap:8px;align-items:center;">
                <input id="cal-f-start-display" type="text" class="form-control" placeholder="Click to pick..." readonly
                       style="cursor:pointer;flex:1;" onclick="hcal.pickStart()">
                <button onclick="hcal.pickStart()"
                    style="background:rgba(255,200,60,0.1);border:1px solid rgba(255,200,60,0.25);color:#ffc83c;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;">⏰</button>
            </div>
            <input id="cal-f-start" type="hidden">
        </div>
        <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">End (optional)</label>
            <div style="display:flex;gap:8px;align-items:center;">
                <input id="cal-f-end-display" type="text" class="form-control" placeholder="Click to pick..." readonly
                       style="cursor:pointer;flex:1;" onclick="hcal.pickEnd()">
                <button onclick="hcal.pickEnd()"
                    style="background:rgba(255,200,60,0.1);border:1px solid rgba(255,200,60,0.25);color:#ffc83c;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;">⏰</button>
            </div>
            <input id="cal-f-end" type="hidden">
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <div style="flex:1;min-width:140px;">
                <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Color</label>
                <input id="cal-f-color" type="color" value="#3498db"
                       style="width:100%;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;">
            </div>
            <div style="flex:1;min-width:140px;display:flex;align-items:flex-end;padding-bottom:4px;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--muted);">
                    <input id="cal-f-allday" type="checkbox" style="accent-color:var(--accent);">
                    All-day event
                </label>
            </div>
            <div style="flex:1;min-width:140px;display:flex;align-items:flex-end;padding-bottom:4px;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f1c40f;">
                    <input id="cal-f-remind" type="checkbox" style="accent-color:#f1c40f;">
                    🔔 Remind me at this time
                </label>
            </div>
        </div>
        
        <!-- NEW: Alarm Type selection (only visible/relevant if remindme is checked) -->
        <div id="cal-reminder-options" style="display:none; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); margin-top:-4px;">
            <div style="font-size:11px; color:var(--muted); margin-bottom:8px;">Alarm Type:</div>
            <div style="display:flex; gap:16px;">
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px;">
                    <input type="radio" name="cal-remind-type" value="simple" checked style="accent-color:var(--accent);">
                    Standard
                </label>
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#f1c40f;">
                    <input type="radio" name="cal-remind-type" value="interactive" style="accent-color:#f1c40f;">
                    Interactive (Snooze)
                </label>
            </div>
        </div>

        <div>
            <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">Notes</label>
            <textarea id="cal-f-notes" class="form-control" rows="2" placeholder="Optional notes..."></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
            <button onclick="hcal.cancelForm()"
                style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--muted);border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;">
                Cancel
            </button>
            <button id="cal-submit-btn" onclick="hcal.submitForm()"
                style="background:rgba(52,152,219,0.2);border:1px solid rgba(52,152,219,0.4);color:#3498db;border-radius:8px;padding:8px 22px;cursor:pointer;font-size:13px;font-weight:700;">
                Save Event
            </button>
        </div>
        <div id="cal-form-msg" style="font-size:11px;min-height:14px;text-align:center;"></div>
    </div>
</div>

<style>
.cal-view-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
}
.cal-view-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.active-view {
    background: rgba(52,152,219,0.2) !important;
    border-color: rgba(52,152,219,0.4) !important;
    color: #3498db !important;
}
.fc-event {
    cursor: pointer !important;
}
</style>

<script>
(function() {
    let _calendar = null;
    let _localeStr = 'en-US';  // updated by init()
    let _dayColors = {};

    function _applyDayColors(colors) {
        _dayColors = colors || {};
        console.log("CALENDAR: applying day colors", _dayColors);
        let styleEl = document.getElementById('cal-dynamic-styles');
        if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'cal-dynamic-styles';
            document.head.appendChild(styleEl);
        }
        let css = '';
        const dayMap = ['sun','mon','tue','wed','thu','fri','sat'];
        for (let i=0; i<7; i++) {
            const col = _dayColors[i];
            if (col && col !== 'transparent' && col !== '#00000000') {
                // Targeting both the cell and its children to ensure visibility
                css += `#hecos-fullcalendar .fc-day-${dayMap[i]} { background-color: ${col} !important; }\n`;
                css += `#hecos-fullcalendar .fc-day-${dayMap[i]} .fc-daygrid-day-bg { background-color: ${col} !important; }\n`;
                css += `#hecos-fullcalendar .fc-day-${dayMap[i]} .fc-daygrid-day-frame { background-color: transparent !important; }\n`;
            }
        }
        styleEl.textContent = css;
    }

    function _hexToRgba(hex, alpha) {
        if (!hex || hex === 'transparent' || hex === '#000000') return 'transparent';
        if (hex.startsWith('rgba')) return hex;
        let r=0, g=0, b=0;
        try {
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1,3), 16);
                g = parseInt(hex.substring(3,5), 16);
                b = parseInt(hex.substring(5,7), 16);
            }
            const res = `rgba(${r},${g},${b},${alpha})`;
            console.log(`CALENDAR: converted ${hex} to ${res}`);
            return res;
        } catch(e) {
            console.error("CALENDAR: hex conversion error", e);
            return hex;
        }
    }

    function _fmt(iso) {
        if (!iso) return '';
        try {
            const d = new Date(iso);
            return d.toLocaleDateString(_localeStr, {weekday:'short', day:'2-digit', month:'short', year:'numeric'})
                + ' ' + d.toLocaleTimeString(_localeStr, {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return iso; }
    }

    function _showPopup(info) {
        const popup = document.getElementById('cal-event-popup');
        const ev = info.event;
        const notes = ev.extendedProps?.notes || '';
        const hasReminder = ev.extendedProps?.has_reminder;
        
        popup.innerHTML = `
            <div class="pop-title" style="display:flex; align-items:center; justify-content:space-between;">
                ${ev.title}
                ${hasReminder ? '<span title="Reminder Active" style="color:#f1c40f; font-size:14px;">🔔</span>' : ''}
            </div>
            <div class="pop-time">📅 ${_fmt(ev.startStr)}${ev.endStr ? ' → ' + _fmt(ev.endStr) : ''}</div>
            ${notes ? `<div class="pop-notes">${notes}</div>` : ''}
            <div class="pop-actions" style="margin-top:12px; display:flex; gap:8px;">
                <button class="pop-edit" onclick="hcal.editEvent('${ev.id}')" style="background:var(--accent); color:white; border:none; padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer;">✎ Edit</button>
                <button class="pop-delete" onclick="hcal.deleteEvent('${ev.id}')">🗑 Delete</button>
                <button class="pop-close" onclick="document.getElementById('cal-event-popup').style.display='none'">Close</button>
            </div>
        `;
        popup.style.display = 'block';
        // Position near click (fixed positioning)
        const r = info.el.getBoundingClientRect();
        popup.style.top  = (r.bottom + 6) + 'px';
        popup.style.left = Math.min(r.left, window.innerWidth - 340) + 'px';
    }

    async function init() {
        const el = document.getElementById('hecos-fullcalendar');
        if (!el || !window.FullCalendar) return;

        let localeStr = 'en-US';
        try {
            const resp = await fetch('/hecos/config');
            const data = await resp.json();
            const calCfg = (data.extensions || {}).calendar || {};
            localeStr = calCfg.calendar_locale || 'en-US';
            _localeStr = localeStr;
            
            _applyDayColors(calCfg.day_colors);

            // Populate dropdowns
            const locEl = document.getElementById('cal-set-locale');
            const cntEl = document.getElementById('cal-set-country');
            if (calCfg.calendar_locale && locEl.querySelector(`option[value="${calCfg.calendar_locale}"]`)) {
                locEl.value = calCfg.calendar_locale;
            }
            if (calCfg.calendar_country && cntEl.querySelector(`option[value="${calCfg.calendar_country}"]`)) {
                cntEl.value = calCfg.calendar_country;
            }

            // Populate day colors
            if (calCfg.day_colors) {
                for (let i=0; i<7; i++) {
                    const picker = document.getElementById(`color-day-${i}`);
                    if (picker && calCfg.day_colors[i]) {
                        // Extract hex from rgba for the picker
                        let col = calCfg.day_colors[i];
                        if (col.startsWith('rgba')) {
                            const match = col.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
                            if (match) {
                                const r = parseInt(match[1]).toString(16).padStart(2,'0');
                                const g = parseInt(match[2]).toString(16).padStart(2,'0');
                                const b = parseInt(match[3]).toString(16).padStart(2,'0');
                                col = `#${r}${g}${b}`;
                            }
                        }
                        picker.value = col;
                    }
                }
            }
        } catch(e) { console.warn('Calendar config fetch error:', e); }

        _calendar = new FullCalendar.Calendar(el, {
            locale: localeStr,
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
            height: 'auto',
            eventSources: [
                {
                    events: function(fetchInfo, successCallback, failureCallback) {
                        fetch(`/api/ext/calendar/events?start=${fetchInfo.startStr}&end=${fetchInfo.endStr}`)
                            .then(r => r.json())
                            .then(data => successCallback(data.ok ? data.events : []))
                            .catch(failureCallback);
                    }
                },
                {
                    events: function(fetchInfo, successCallback, failureCallback) {
                        fetch(`/api/ext/calendar/holidays?start=${fetchInfo.startStr}&end=${fetchInfo.endStr}`)
                            .then(r => r.json())
                            .then(data => {
                                if (data && data.error) {
                                    console.error('Holidays Python Error:', data.error);
                                    document.getElementById('cal-form-msg').innerHTML = `<span style="color:#e74c3c;">Holiday Fetch Error: ${data.error}</span>`;
                                }
                                successCallback(Array.isArray(data) ? data : []);
                            })
                            .catch(failureCallback);
                    }
                }
            ],
            eventClick: function(info) { _showPopup(info); },
            dateClick: function(info) {
                // Pre-fill the form with the clicked date and open it
                openNewEventForm(info.dateStr + 'T09:00:00');
            },
        });
        _calendar.render();

        // Fix FullCalendar sizing issues when initialized in a hidden tab
        const tabEl = document.getElementById('tab-calendar');
        if (tabEl) {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.attributeName === 'class' && tabEl.classList.contains('active')) {
                        setTimeout(() => { if (_calendar) _calendar.render(); }, 50);
                    }
                });
            });
            observer.observe(tabEl, { attributes: true });
        }
    }

    function setView(view) {
        if (_calendar) _calendar.changeView(view);
        document.querySelectorAll('.cal-view-btn').forEach(b => b.classList.remove('active-view'));
        const map = { dayGridMonth: 'cal-btn-month', timeGridWeek: 'cal-btn-week', listWeek: 'cal-btn-list' };
        if (map[view]) document.getElementById(map[view])?.classList.add('active-view');
    }

    function openNewEventForm(prefilledStart) {
        hcal.cancelForm();
        document.getElementById('cal-add-form').style.display = 'block';
        document.getElementById('cal-form-title').textContent = 'Add Event';
        document.getElementById('cal-submit-btn').textContent = 'Confirm Event';
        document.getElementById('cal-f-title').focus();
        
        if (prefilledStart) {
            document.getElementById('cal-f-start').value = prefilledStart;
            document.getElementById('cal-f-start-display').value = _fmt(prefilledStart);
        }
        
        // Ensure options panel matches checkbox state
        const cb = document.getElementById('cal-f-remind');
        const opts = document.getElementById('cal-reminder-options');
        if (cb && opts) {
            cb.onchange = () => { opts.style.display = cb.checked ? 'block' : 'none'; };
            opts.style.display = cb.checked ? 'block' : 'none';
        }
    }

    let _currentEditId = null;

    function editEvent(id) {
        const ev = _calendar.getEventById(id);
        if (!ev) return;
        
        document.getElementById('cal-event-popup').style.display = 'none';
        hcal.cancelForm();
        
        _currentEditId = id;
        document.getElementById('cal-add-form').style.display = 'block';
        document.getElementById('cal-form-title').textContent = 'Edit Event';
        document.getElementById('cal-submit-btn').textContent = 'Update Event';
        
        document.getElementById('cal-f-title').value = ev.title;
        document.getElementById('cal-f-start').value = ev.startStr;
        document.getElementById('cal-f-start-display').value = _fmt(ev.startStr);
        document.getElementById('cal-f-end').value = ev.endStr || '';
        document.getElementById('cal-f-end-display').value = ev.endStr ? _fmt(ev.endStr) : '';
        document.getElementById('cal-f-color').value = ev.backgroundColor || '#3498db';
        document.getElementById('cal-f-allday').checked = ev.allDay;
        document.getElementById('cal-f-notes').value = ev.extendedProps.notes || '';
        
        const hasRemind = ev.extendedProps.has_reminder;
        const cb = document.getElementById('cal-f-remind');
        const opts = document.getElementById('cal-reminder-options');
        if (cb) {
            cb.checked = hasRemind;
            if (opts) opts.style.display = hasRemind ? 'block' : 'none';
        }
        
        if (hasRemind) {
            const isInt = ev.extendedProps.interactive;
            const radios = document.getElementsByName('cal-remind-type');
            radios.forEach(r => { if(r.value === (isInt ? 'interactive' : 'simple')) r.checked = true; });
        }

        document.getElementById('cal-add-form').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelForm() {
        _currentEditId = null;
        document.getElementById('cal-add-form').style.display = 'none';
        document.getElementById('cal-form-title').textContent = 'Add Event';
        document.getElementById('cal-submit-btn').textContent = 'Confirm Event';
        ['cal-f-title','cal-f-start','cal-f-start-display','cal-f-end','cal-f-end-display','cal-f-notes'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        const cb = document.getElementById('cal-f-remind');
        if (cb) {
            cb.checked = false;
            document.getElementById('cal-reminder-options').style.display = 'none';
        }
    }

    function pickStart() {
        HecosWheelPicker.open({
            mode: 'datetime',
            locale: document.getElementById('cal-set-locale')?.value || 'it',
            onConfirm: (iso) => {
                document.getElementById('cal-f-start').value = iso;
                document.getElementById('cal-f-start-display').value = _fmt(iso);
            }
        });
    }

    function pickEnd() {
        HecosWheelPicker.open({
            mode: 'datetime',
            locale: document.getElementById('cal-set-locale')?.value || 'it',
            onConfirm: (iso) => {
                document.getElementById('cal-f-end').value = iso;
                document.getElementById('cal-f-end-display').value = _fmt(iso);
            }
        });
    }

    function submitForm() {
        const title = (document.getElementById('cal-f-title').value || '').trim();
        const start = (document.getElementById('cal-f-start').value || '').trim();
        const end   = (document.getElementById('cal-f-end').value || '').trim() || null;
        const color  = document.getElementById('cal-f-color').value;
        const allDay = document.getElementById('cal-f-allday').checked;
        const remindMe = document.getElementById('cal-f-remind').checked;
        
        // Extract interactive flag from radio buttons
        const rType = document.querySelector('input[name="cal-remind-type"]:checked')?.value;
        const interactive = (rType === 'interactive');
        
        const notes  = (document.getElementById('cal-f-notes').value || '').trim() || null;
        const msg    = document.getElementById('cal-form-msg');

        if (!title || !start) { msg.style.color='#e05'; msg.textContent='Title and start are required.'; return; }

        const url = _currentEditId ? `/api/ext/calendar/events/${_currentEditId}` : '/api/ext/calendar/events';
        const method = _currentEditId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ title, start, end, color, allDay, notes, remindMe, interactive })
        })
        .then(r => r.json())
        .then(data => {
            msg.style.color = data.ok ? 'var(--accent)' : '#e05';
            msg.textContent = data.ok ? '✅ Event saved!' : (data.error || 'Error');
            if (data.ok) {
                if (_calendar) _calendar.refetchEvents();
                if (window.calendarWidget) calendarWidget.refresh();
                if (remindMe && window.reminderWidget) reminderWidget.refresh(); // Refresh reminders if we added one
                setTimeout(cancelForm, 1200);
            }
        })
        .catch(() => { msg.style.color='#e05'; msg.textContent='Network error.'; });
    }

    function deleteEvent(id) {
        if (!confirm('Delete this event?')) return;
        fetch(`/api/ext/calendar/events/${id}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    document.getElementById('cal-event-popup').style.display = 'none';
                    if (_calendar) _calendar.refetchEvents();
                    if (window.calendarWidget) calendarWidget.refresh();
                }
            });
    }

    function previewColors() {
        let dayColors = [];
        for (let i=0; i<7; i++) {
            const picker = document.getElementById(`color-day-${i}`);
            if (picker && picker.value) {
                dayColors[i] = _hexToRgba(picker.value, (i === 0 ? 0.35 : 1 === i ? 0.25 : 0.2));
                if (picker.value === '#000000') dayColors[i] = 'transparent';
            }
        }
        _applyDayColors(dayColors);
    }

    let _saveTimeout = null;
    function handleColorInput() {
        previewColors();
        clearTimeout(_saveTimeout);
        _saveTimeout = setTimeout(saveSettings, 1500); 
    }

    function saveSettings() {
        const locale = document.getElementById('cal-set-locale').value;
        const country = document.getElementById('cal-set-country').value;
        
        let dayColors = [];
        for (let i=0; i<7; i++) {
            const picker = document.getElementById(`color-day-${i}`);
            if (picker && picker.value) {
                dayColors[i] = _hexToRgba(picker.value, (i === 0 ? 0.35 : 1 === i ? 0.25 : 0.2));
                if (picker.value === '#000000') dayColors[i] = 'transparent';
            }
        }

        fetch('/hecos/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                extensions: { 
                    calendar: { 
                        calendar_locale: locale, 
                        calendar_country: country,
                        day_colors: dayColors
                    } 
                } 
            })
        })
        .then(r => r.json())
        .then(d => {
            if (d.ok) {
                _applyDayColors(dayColors);
                if (_calendar) {
                    _calendar.setOption('locale', locale);
                    _calendar.refetchEvents();
                    _calendar.render();
                }
                
                const status = document.getElementById('cal-sync-status');
                if (status) {
                    status.style.opacity = '1';
                    setTimeout(() => { status.style.opacity = '0'; }, 2000);
                }
            }
        })
        .catch(e => console.error('CALENDAR: Auto-save failed', e));
    }

    function toggleColorSettings() {
        const panel = document.getElementById('cal-color-settings');
        const btn = document.getElementById('cal-btn-colors');
        const isHidden = panel.style.display === 'none';
        panel.style.display = isHidden ? 'block' : 'none';
        btn.style.background = isHidden ? 'rgba(52, 152, 219, 0.2)' : 'rgba(255,255,255,0.05)';
        btn.style.color = isHidden ? '#3498db' : 'var(--muted)';
    }

    // Close popup on outside click
    document.addEventListener('click', function(e) {
        const popup = document.getElementById('cal-event-popup');
        if (popup && !popup.contains(e.target) && !e.target.closest('.fc-event'))
            popup.style.display = 'none';
    });

    // Init after DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        setTimeout(init, 100);
    }

    window.hcal = { setView, openNewEventForm, editEvent, cancelForm, pickStart, pickEnd, submitForm, deleteEvent, saveSettings, previewColors, handleColorInput, toggleColorSettings,
                    refresh: () => { if (_calendar) _calendar.refetchEvents(); } };
})();
</script>
</div>
