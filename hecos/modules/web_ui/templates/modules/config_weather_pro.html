<!-- config_weather_pro.html — Loaded lazily via /hecos/config/fragment/weather_pro -->
<div id="tab-weather_pro" class="panel">
  <div class="card">
    <div class="card-title">Weather Pro</div>
    <div style="font-size:13px; color:var(--muted); margin-bottom:15px;">
        Real-time weather powered by <a href="https://open-meteo.com" target="_blank" style="color:var(--accent); text-decoration:none;">Open-Meteo</a> — no API key required.
    </div>

    <div class="field">
      <label>Default City</label>
      <input type="text" id="wp-default-city" placeholder="e.g. Rome, London, New York...">
    </div>
    <div style="font-size:11px; color:var(--muted); margin-top:-10px; margin-bottom:15px; padding-left:14px;">
        Leave empty to auto-detect from your IP address.
    </div>

    <div class="field">
      <label>Temperature Unit</label>
      <select id="wp-units">
        <option value="celsius">°C (Celsius)</option>
        <option value="fahrenheit">°F (Fahrenheit)</option>
      </select>
    </div>

    <button class="btn-primary" onclick="wpSaveAll()" style="width:100%; margin-top:15px; display:flex; justify-content:center; align-items:center; gap:8px;">
      <i class="fas fa-save"></i> Save Settings
    </button>
    <div id="wp-save-msg" style="margin-top:10px; font-size:12px; color:var(--accent); display:none; text-align:center;">
        <i class="fas fa-check"></i> Settings saved
    </div>
  </div>

  <div class="card">
    <div class="card-title">Live Preview</div>
    <div id="wp-preview-loading" style="font-size:12px; color:var(--muted); text-align:center; padding:15px;">
        <i class="fas fa-circle-notch fa-spin"></i> Loading preview…
    </div>
    <div id="wp-preview-data" style="display:none; padding:10px; background:var(--bg2); border-radius:8px; font-size:14px; text-align:center;"></div>
  </div>
</div>

<script>
(function() {
    // ── Load saved config ──────────────────────────────────────────────────
    async function loadWpConfig() {
        try {
            const r = await fetch('/api/config');
            const cfg = await r.json();
            const wp = (cfg.plugins || {}).WEATHER_PRO || {};
            document.getElementById('wp-default-city').value = wp.default_city || '';
            const units = wp.units || 'celsius';
            document.getElementById('wp-units').value = units;
        } catch(e) { console.error('[WP Config] Load failed:', e); }
        loadPreview();
    }

    // ── Save helpers ───────────────────────────────────────────────────────
    window.wpSaveAll = async function() {
        try {
            const data = {
                default_city: document.getElementById('wp-default-city').value.trim(),
                units: document.getElementById('wp-units').value
            };
            const r = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ plugins: { WEATHER_PRO: data } })
            });
            if (r.ok) {
                const msg = document.getElementById('wp-save-msg');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 2500);
            }
        } catch(e) { console.error('[WP Config] Save failed:', e); }
        loadPreview();
    };

    // ── Live preview ───────────────────────────────────────────────────────
    async function loadPreview() {
        try {
            document.getElementById('wp-preview-loading').style.display = 'block';
            document.getElementById('wp-preview-data').style.display = 'none';
            const r = await fetch('/api/weather_pro/data', { credentials: 'same-origin' });
            const data = await r.json();
            document.getElementById('wp-preview-loading').style.display = 'none';
            const el = document.getElementById('wp-preview-data');
            if (data.error) {
                el.innerHTML = `<span style="color:#ff6b6b;">⚠️ ${data.error}</span>`;
            } else {
                const c = data.current || {};
                const u = data.current_units || {};
                el.innerHTML = `
                    <strong>${data.location}</strong><br>
                    <span style="display:inline-block; margin-top:6px; color:var(--text-color);">
                        🌡️ ${c.temperature_2m}${u.temperature_2m} &nbsp;
                        💧 ${c.relative_humidity_2m}% &nbsp;
                        💨 ${c.wind_speed_10m} ${u.wind_speed_10m}
                    </span>
                `;
            }
            el.style.display = 'block';
        } catch(e) {
            document.getElementById('wp-preview-loading').textContent = 'Preview unavailable.';
        }
    }

    // Init
    loadWpConfig();
})();
</script>
