<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - Hecos Docs</title>
    <link rel="icon" type="image/png" href="/assets/Hecos_Logo_SQR_NBG_LogoOnly.png">
    <link rel="stylesheet" href="/assets/css/core/variables.css?v={{ version }}">
    <link rel="stylesheet" href="/assets/css/index.css?v={{ version }}">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Docs Scoped Styles -->
    {% include 'modules/docs/_docs_styles.html' %}
</head>
<body>
<script>
  (function() {
    var autoTheme = localStorage.getItem('hecos-ui-auto-theme') === 'true';
    var savedTheme = localStorage.getItem('hecos-ui-theme') || 'cyberpunk';
    var theme = 'cyberpunk';
    if (autoTheme) {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'cyberpunk' : 'light';
    } else {
      theme = savedTheme;
    }
    if (theme !== 'default') {
      document.body.classList.add('theme-' + theme);
    }
  })();
</script>

{% include 'modules/docs/_docs_sidebar.html' %}
{% include 'modules/docs/_docs_main.html' %}

<!-- Inject server-side variables to JS environment -->
<script>
    window.docsEnv = {
        currentGroup: "{{ group }}",
        currentChapter: "{{ initial_chapter }}",
        currentLang: "{{ lang }}"
    };
</script>
<!-- Main Docs Logic -->
<script src="/static/js/docs_engine.js?v={{ version }}"></script>

<style>
    @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
    }
</style>

</body>
</html>
