<!DOCTYPE html>
<html lang="{{ zconfig.language or 'en' }}">
<head>
{% include 'modules/core/_core_head.html' %}
</head>
<body class="config-page">
<!-- Synchronous Theme Setup to Prevent Flash of Unstyled Content -->
<script>
  (function() {
    var autoTheme = localStorage.getItem('hecos-ui-auto-theme') === 'true';
    var savedTheme = localStorage.getItem('hecos-ui-theme') || 'cyberpunk';
    var theme = autoTheme ? 'native' : savedTheme;
    if (theme && theme !== 'default') {
      document.body.classList.add('theme-' + theme);
    }
  })();
</script>

{% include 'modules/core/_core_header.html' %}

<div class="container">
  <div id="config-welcome-container">
    {% include 'modules/config_welcome.html' %}
  </div>

  <!-- CATEGORY FILTER TABS -->
  <div id="config-filter-tabs" class="filter-tabs">
      <!-- Populated by config_core.js -->
  </div>

  <!-- DYNAMIC TABS BAR -->
  <div class="tabs-container" id="tabs-bar-container">
     <div id="config-tabs-bar">
        <!-- Populated immediately by config_core.js at DOMContentLoaded — no delay -->
        <div id="tab-engine-init-msg" style="padding:10px 14px; color:var(--muted); font-size: var(--font-size-sm); display:flex; align-items:center; gap:6px;">
          <i class="fas fa-cog" style="animation: spin 1.2s linear infinite; font-size:13px;"></i>
          <span id="init-text">Initializing Tab Engine<span class="dot-anim"></span></span>
        </div>
        <script>
            // Check if scripts are already cached to show a custom message on first load
            if (!localStorage.getItem('hecos_scripts_cached')) {
                const initText = document.getElementById('init-text');
                if (initText) {
                    initText.innerHTML = `Initializing Tab Engine (First load takes a bit longer...) <span class="dot-anim"></span>`;
                }
            }
            // Mark cache as loaded when window load event fires
            window.addEventListener('load', () => {
                localStorage.setItem('hecos_scripts_cached', 'true');
            });
        </script>
     </div>
  </div>

  <div id="config-main-ui-wrapper">
    <!-- WALL / GRID VIEW (Hidden by default) -->
    <div id="config-wall" class="config-wall" style="display:none;">
      <!-- Will be populated by config_core.js -->
    </div>
  </div>

  <form id="config-form" onsubmit="event.preventDefault(); saveConfig();">
    <!-- Panels are loaded lazily via fetch on tab click. -->
    <!-- The welcome panel is the only panel that is always present in the DOM. -->
    <div id="panel-container">
      <!-- Panels will be injected here by config_core.js -->
      <!-- Skeleton shown while a panel is loading -->
      <div id="panel-skeleton" style="display:none; padding:40px 20px; text-align:center; color:var(--muted);">
        <div style="font-size:28px; margin-bottom:16px; display:inline-block;"><i class="fas fa-cog fa-spin"></i></div>
        <div style="font-size:14px;">Loading panel...</div>
      </div>
    </div>
  </form>
</div>

{% include 'modules/core/_core_save_bar.html' %}

{% include 'modules/core/_core_scripts.html' %}

<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  TWO-PHASE SCRIPT LOADING                                           ║
  ║                                                                     ║
  ║  PHASE 1 — CRITICAL PATH (6 scripts, ~60KB total):                 ║
  ║    These are the only scripts needed to render the hub menu.        ║
  ║    Loaded with defer so they download in parallel, but execute      ║
  ║    before everything else. The menu appears in <1s.                 ║
  ║                                                                     ║
  ║  PHASE 2 — NON-CRITICAL (36 scripts, ~530KB total):                ║
  ║    Loaded dynamically via JS after the hub menu has rendered.       ║
  ║    The user can already navigate while these load in background.    ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->

<!-- PHASE 1: Critical rendering path — must run before everything else -->
<script defer src="/static/js/config_manifest.js?v={{ version }}-persistence-v3"></script>
<script defer src="/static/js/config_core_utils.js?v={{ version }}"></script>
<script defer src="/static/js/config_core_init.js?v={{ version }}"></script>
<script defer src="/static/js/config_core_navigation.js?v={{ version }}"></script>
<script defer src="/static/js/config_core_hub.js?v={{ version }}"></script>
<script defer src="/static/js/config_core_persistence.js?v={{ version }}"></script>
<script defer src="/static/js/config_core_status.js?v={{ version }}"></script>
<script defer src="/static/js/config_core.js?v={{ version }}"></script>

<!-- PHASE 2: Non-critical scripts — loaded dynamically after hub renders -->
<script defer src="/static/js/config_core_phase2_loader.js?v={{ version }}"></script>

</body>
</html>
