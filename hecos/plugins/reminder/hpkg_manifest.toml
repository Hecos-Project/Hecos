id = "reminder"
name = "Reminder"
version = "1.0.0"
author = "Hecos Core Team"
description = "Schedule time-based reminders with TTS alerts and WebUI notifications. Supports natural language and recurring CRON expressions."
type = "plugin"
target_dir = "plugins"
plugin_dir = "."
hecos_min_version = "0.34.0"
readme = "README.md"
readme_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/reminder_src/README.md"
icon_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/Hecos_module_Image_preview_square.png"
dependencies = []
optional_dependencies = []
pip_requirements = [
    "schedule",
]
tag = "REMINDER"
lazy_load = true
is_class_based = true
widgets = [
    { id = "reminder", extension_path = "reminder/" },
]
signature = "FtvWTVXPvvEN1PBPyo6Av7x9MZPXgMtb0T3rTqhXUUEWAJqkSwkk6kTnj6uZIDnbD0Wb8LXuYzWMvTTzyhL4Cw=="

[commands]
set_reminder = "Creates a reminder. Fires TTS + WebUI alert at the specified time."
list_reminders = "Lists all active reminders with their scheduled time and ID."
cancel_reminder = "Cancels an active reminder by ID."
snooze_reminder = "Postpones a reminder by N minutes from now."

[[slash_commands]]
id = "reminder"
aliases = [
    "/reminder",
    "/ricorda",
    "/promemoria",
]
description = "Imposta un nuovo promemoria"
usage = "/reminder <titolo> alle <ora>"
example = "/reminder chiamata Marco alle 15:30"
icon = "⏱"
method = "set_reminder"
requires_args = true

[[slash_commands]]
id = "reminders"
aliases = [
    "/reminders",
    "/promemoria list",
]
description = "Elenca tutti i promemoria attivi"
usage = "/reminders"
example = "/reminders"
icon = "📋"
method = "list_reminders"
requires_args = false

[[tool_schema]]

[tool_schema.function]
name = "REMINDER__set_reminder"
description = "Creates a new reminder that fires a voice alert and WebUI notification at the specified time. Supports natural language ('tomorrow at 15:00', 'in 20 minutes') and CRON-style recurrence ('every Monday at 9:00', 'ogni giorno alle 8'). Always use this when the user says 'remind me', 'ricordami', 'svegliami', 'imposta un promemoria'."

[tool_schema.function.parameters]
type = "object"
required = [
    "title",
    "when",
]

[tool_schema.function.parameters.properties.title]
type = "string"
description = "What to remind the user about. Be concise and descriptive (e.g. 'Call the doctor', 'Check the oven', 'Daily standup')."

[tool_schema.function.parameters.properties.when]
type = "string"
description = "When to fire the reminder. Accepts natural language: 'domani alle 15:00', 'tra 20 minuti', 'every Monday at 9:00', 'ogni giorno alle 8', 'next Friday at 18:30'."

[tool_schema.function.parameters.properties.repeat]
type = "string"
description = "Optional: explicit CRON expression (5 fields: min hour day month day_of_week) for advanced recurring schedules. Leave empty and use 'when' for natural language recurrence."

[[tool_schema]]

[tool_schema.function]
name = "REMINDER__list_reminders"
description = "Returns a formatted list of all active reminders (title, scheduled time, ID). Use this when the user asks 'what reminders do I have?', 'mostrami i promemoria', 'lista promemoria'."

[tool_schema.function.parameters]
type = "object"

[tool_schema.function.parameters.properties]

[[tool_schema]]

[tool_schema.function]
name = "REMINDER__cancel_reminder"
description = "Cancels an active reminder. The reminder_id can be the full UUID or the first 8 characters shown in list_reminders. Use this when the user says 'cancel reminder', 'cancella promemoria', 'elimina promemoria'."

[tool_schema.function.parameters]
type = "object"
required = [
    "reminder_id",
]

[tool_schema.function.parameters.properties.reminder_id]
type = "string"
description = "The full ID or first 8 characters of the reminder ID (as shown in list_reminders)."

[[tool_schema]]

[tool_schema.function]
name = "REMINDER__snooze_reminder"
description = "Postpones a reminder by a specified number of minutes from the current time. Use when the user says 'snooze', 'posticipa', 'rimandalo di X minuti'."

[tool_schema.function.parameters]
type = "object"
required = [
    "reminder_id",
]

[tool_schema.function.parameters.properties.reminder_id]
type = "string"
description = "The full ID or first 8 characters of the reminder to snooze."

[tool_schema.function.parameters.properties.minutes]
type = "integer"
description = "How many minutes to postpone the reminder. Default: 15."

[config_panel]
tab_id = "reminder"
tab_label = "Reminder"
tab_icon = "<i class=\"fas fa-clock\"></i>"
category = "SISTEMA"
template_file = "templates/config/config_reminder.html"

