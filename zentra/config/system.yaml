ai:
  active_personality: Zentra_System_Soul.txt
  available_personalities: {}
  save_special_instructions: false
  special_instructions: ''
backend:
  type: cloud
  cloud:
    model: gemini/gemini-2.5-flash
    temperature: 0.7
  kobold:
    url: http://localhost:5001
    model: ''
    max_length: 512
    temperature: 0.8
    top_p: 0.92
    rep_pen: 1.1
  ollama:
    model: qwen2.5:1.5b
    available_models: {}
    num_ctx: 4096
    num_gpu: 25
    num_predict: 250
    temperature: 0.3
    top_p: 0.9
    repeat_penalty: 1.1
    keep_alive: 120m
bridge:
  use_processor: true
  chunk_delay_ms: 0
  debug_log: true
  remove_think_tags: true
  local_voice_enabled: false
  webui_voice_enabled: true
  webui_voice_stt: true
  enable_tools: true
cognition:
  memory_enabled: true
  episodic_memory: true
  clear_on_restart: false
  include_identity_context: true
  include_self_awareness: true
  max_history_messages: 20
filters:
  remove_asterisks: true
  remove_round_brackets: true
  remove_square_brackets: false
  custom_replacements: {}
language: en
llm:
  allow_cloud: true
  debug_llm: true
  providers:
    gemini:
      api_key: ''
      models:
        - gemini/gemini-2.0-flash
    openai:
      api_key: ''
      models:
        - openai/gpt-4o
    anthropic:
      api_key: ''
      models:
        - anthropic/claude-3-5-sonnet-20240620
    groq:
      api_key: ''
      models:
        - groq/llama-3.3-70b-versatile
logging:
  level: DEBUG
  destination: console
  message_types: both
  web_level: BOTH
  web_max_history: 100
  web_autoscroll: true
  web_split: false
monitor:
  check_interval: 1
  restart_delay: 2
plugins:
  DASHBOARD:
    enabled: true
    lazy_load: false
    backend_timeout: 0.5
    monitor_interval: 2
  FILE_MANAGER:
    enabled: true
    lazy_load: false
    enable_path_mapping: true
    max_list_items: 5
    max_read_lines: 50
  HELP:
    enabled: true
    lazy_load: false
    show_disabled: false
  IMAGE_GEN:
    enabled: true
    lazy_load: false
    width: 1024
    height: 1024
    nologo: false
  MEDIA:
    enabled: true
    lazy_load: false
  ROLEPLAY:
    enabled: true
    lazy_load: false
    default_character: ''
    default_scene: ''
    llm_model: ''
    characters_dir: plugins/roleplay/characters
    scenes_dir: plugins/roleplay/scenes
  SYSTEM:
    enabled: true
    lazy_load: false
    enable_config_set: true
    shell_command_timeout: 15
    shell_command_whitelist: []
    explorer_mappings: {}
    programs: {}
  SYS_NET:
    enabled: true
    lazy_load: false
    proxy_url: socks5://localhost:9150
  WEB:
    enabled: true
    lazy_load: false
    llm_model: ''
    search_engine: google
    use_https: true
    open_in_new_tab: false
  WEBCAM:
    enabled: true
    lazy_load: false
    camera_index: 0
    image_format: jpg
    save_directory: snapshots
    stabilization_delay: 0.5
  WEB_UI:
    enabled: true
    lazy_load: false
    port: 7070
    auto_open_browser: false
    https_enabled: false
    cert_file: certs/cert.pem
    key_file: certs/key.pem
  EXECUTOR:
    enabled: true
    lazy_load: false
    timeout_seconds: 10
  DRIVE:
    enabled: true
    lazy_load: true
    root_dir: ''
    max_upload_mb: 100
    allowed_extensions: ''
    editor:
      enabled: true
      theme: vs-dark
      max_file_size_kb: 1024
      word_wrap: true
      spell_check: false
processor:
  debug_mode: false
  log_level: INFO
routing_engine:
  mode: auto
  legacy_models: ''
system:
  fast_boot: true
  flask_debug: false
