<!-- ROLEPLAY PANEL -->
<div id="tab-roleplay" class="panel">
  <div class="card">
    <div class="card-title">🎭 Roleplay & AI Personality Souls</div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">
      Deeply customize how the AI behaves in immersive scenarios, including character souls and world knowledge.
    </p>

    <div class="toggle-row">
      <div class="toggle-info">
        <strong>Enable Roleplay Mode</strong><br>
        <small>Forces the AI to strictly adhere to its assigned persona.</small>
      </div>
      <label class="switch"><input type="checkbox" id="rp-enabled"><span class="slider"></span></label>
    </div>

    <div class="field">
      <label>Active Personality Soul</label>
      <select id="rp-personality">
        <!-- Re-uses personality list -->
      </select>
    </div>

    <div class="field">
      <label>Global Immersion Instructions</label>
      <textarea id="rp-instructions" rows="4" placeholder="Always speak in third person..."></textarea>
    </div>
  </div>
</div>
