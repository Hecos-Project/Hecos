<div id="tab-users" class="panel">
  <!-- FASE 5: My Profile Card -->
  <div class="card" style="margin-bottom: 20px;">
    <div class="card-title">My Profile</div>
    <div class="row">
      <div class="group" style="flex:2;">
        <label>Personal Setup</label>
        <input type="text" id="my_display_name" class="input-modern" placeholder="Display Name e.g. John Doe" style="margin-bottom:8px;">
        <textarea id="my_bio_notes" class="input-modern" placeholder="Memories or bio notes about you..." style="height:60px; margin-bottom:8px;"></textarea>
        <select id="my_language" class="input-modern" style="margin-bottom:8px;">
            <option value="en">English</option>
            <option value="it">Italiano</option>
            <option value="es">Español</option>
        </select>
        <button type="button" class="btn btn-primary" onclick="saveMyProfile()">Salva Profilo</button>
      </div>
      <div class="group" style="flex:1; text-align:center;">
        <label>Avatar</label>
        <div style="margin-bottom: 10px;">
            <img id="my_avatar_preview" src="" alt="Avatar" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #45a29e; display:none; margin: 0 auto;">
            <div id="my_avatar_placeholder" style="width:100px; height:100px; border-radius:50%; background:#1e2430; border:2px dashed #444; color:#888; display:flex; align-items:center; justify-content:center; margin: 0 auto;">No IMG</div>
        </div>
        <input type="file" id="my_avatar_file" accept="image/jpeg, image/png" style="display:none;" onchange="uploadMyAvatar()">
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('my_avatar_file').click()">Carica Foto</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Users & Roles</div>
    <div class="row">
      <div class="group" style="flex:2;">
        <label>Registered Accounts</label>
        <div id="users-table-container" style="background:#1e2430; border:1px solid #444; border-radius:6px; padding:10px; min-height:100px;">
        <p style="color:#888; font-size:12px;">Caricamento utenti...</p>
      </div>
    </div>
    
    <div class="group" style="flex:1;">
      <label>Crea Nuovo Utente</label>
      <input type="text" id="new_user_name" class="input-modern" placeholder="Username" autocomplete="off" style="margin-bottom:8px;">
      <input type="password" id="new_user_pass" class="input-modern" placeholder="Password" style="margin-bottom:8px;">
      <select id="new_user_role" class="input-modern" style="margin-bottom:8px;">
        <option value="guest">Guest (Base)</option>
        <option value="admin">Admin (Master)</option>
      </select>
      <button type="button" class="btn btn-secondary" onclick="createUser()" style="width:100%;">+ Aggiungi Utente</button>
      </div>
    </div>
  </div>

  <script>
    async function loadMyProfile() {
        try {
            const r = await fetch("/zentra/api/users/me/profile");
            const res = await r.json();
            if (res.ok && res.profile) {
                document.getElementById('my_display_name').value = res.profile.display_name || "";
                document.getElementById('my_bio_notes').value = res.profile.bio_notes || "";
                
                if (res.profile.preferred_language) {
                    document.getElementById('my_language').value = res.profile.preferred_language;
                }
                
                if (res.profile.avatar_path) {
                    const img = document.getElementById('my_avatar_preview');
                    img.src = res.profile.avatar_path + "?t=" + new Date().getTime(); // force reload
                    img.style.display = "block";
                    document.getElementById('my_avatar_placeholder').style.display = "none";
                }
            }
        } catch (e) {
            console.error("Error loading profile:", e);
        }
    }

    async function saveMyProfile() {
        const data = {
            display_name: document.getElementById('my_display_name').value,
            bio_notes: document.getElementById('my_bio_notes').value,
            preferred_language: document.getElementById('my_language').value
        };
        try {
            const r = await fetch("/zentra/api/users/me/profile", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const res = await r.json();
            if (res.ok) {
                alert("Profilo aggiornato!");
            } else {
                alert("Errore salvataggio profilo: " + res.error);
            }
        } catch (e) {
            alert("Errore di rete.");
        }
    }

    async function uploadMyAvatar() {
        const fileInput = document.getElementById('my_avatar_file');
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const r = await fetch("/zentra/api/users/me/avatar", {
                method: "POST",
                body: formData
            });
            const res = await r.json();
            if (res.ok) {
                const img = document.getElementById('my_avatar_preview');
                img.src = res.avatar_path + "?t=" + new Date().getTime();
                img.style.display = "block";
                document.getElementById('my_avatar_placeholder').style.display = "none";
            } else {
                alert("Errore caricamento avatar: " + res.error);
            }
        } catch (e) {
            alert("Errore caricamento.");
        }
    }

    async function loadUsersData() {
        const container = document.getElementById("users-table-container");
        try {
            const r = await fetch("/zentra/api/users");
            const res = await r.json();
            
            if (res.ok) {
                if (res.users.length === 0) {
                    container.innerHTML = `<p style="color:#888; font-size:13px;">Nessun utente trovato.</p>`;
                    return;
                }
                
                let html = `
                <table style="width:100%; border-collapse: collapse; text-align: left; font-size:13px;">
                    <thead>
                        <tr style="border-bottom: 1px solid #444; color:#66fcf1;">
                            <th style="padding: 8px;">ID</th>
                            <th style="padding: 8px;">Username</th>
                            <th style="padding: 8px;">Role</th>
                            <th style="padding: 8px; text-align:right;">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                res.users.forEach(u => {
                    let actions = "";
                    if (u.username === "admin") {
                        actions = `<button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="promptChangePass('${u.username}')">Cambia Pass</button>`;
                    } else {
                         actions = `
                            <button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px; margin-right:4px;" onclick="promptChangePass('${u.username}')">Pass</button>
                            <button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px; background:#422; border-color:#633; color:#f88;" onclick="deleteUser('${u.username}')">Del</button>
                        `;
                    }

                    html += `
                        <tr style="border-bottom: 1px solid #333;">
                            <td style="padding: 8px; color:#aaa;">${u.id}</td>
                            <td style="padding: 8px; font-weight:bold;">${u.username}</td>
                            <td style="padding: 8px; color:#45a29e;">${u.role.toUpperCase()}</td>
                            <td style="padding: 8px; text-align:right;">${actions}</td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p style="color:#f88; font-size:13px;">Errore: ${res.error}</p>`;
            }
        } catch (e) {
            container.innerHTML = `<p style="color:#f88; font-size:13px;">Connessione persa.</p>`;
        }
    }

    async function createUser() {
        const u = document.getElementById("new_user_name").value;
        const p = document.getElementById("new_user_pass").value;
        const r = document.getElementById("new_user_role").value;
        if (!u || !p) { alert("Username e password obbligatori."); return; }

        try {
            const resp = await fetch("/zentra/api/users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({username: u, password: p, role: r})
            });
            const res = await resp.json();
            if (res.ok) {
                document.getElementById("new_user_name").value = "";
                document.getElementById("new_user_pass").value = "";
                loadUsersData();
            } else {
                alert("Errore creazione: " + res.error);
            }
        } catch (e) {
            alert("Errore di rete.");
        }
    }

    async function deleteUser(username) {
        if (!confirm(`Eliminare definitivamente l'utente ${username}?`)) return;
        try {
            const resp = await fetch(`/zentra/api/users/${username}`, { method: "DELETE" });
            const res = await resp.json();
            if (res.ok) loadUsersData();
            else alert("Errore: " + res.error);
        } catch (e) { alert("Errore di rete."); }
    }

    async function promptChangePass(username) {
        const p = prompt(`Inserisci nuova password per l'utente '${username}':`);
        if (!p) return;
        try {
            const resp = await fetch(`/zentra/api/users/${username}/password`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({password: p})
            });
            const res = await resp.json();
            if (res.ok) alert("Password aggiornata con successo.");
            else alert("Errore: " + res.error);
        } catch (e) { alert("Errore di rete."); }
    }
  </script>
</div>
